id: superset
name: Apache Superset
category: analytics
icon: superset
version: latest
image: demoforge/superset:latest
build_context: .
image_size_mb: 1800
description: Open-source data visualization and BI platform. Connects to Trino for SQL dashboards over MinIO data.
resources:
  memory: 1g
  cpu: 0.5
ports:
- name: web
  container: 8088
  protocol: tcp
environment:
  SUPERSET_SECRET_KEY: demoforge-superset-secret-key
  SUPERSET_LOG_LEVEL: WARNING
health_check:
  endpoint: /health
  port: 8088
  interval: 15s
  timeout: 10s
  start_period: 90s
secrets:
- key: SUPERSET_ADMIN_USERNAME
  label: Admin Username
  default: admin
- key: SUPERSET_ADMIN_PASSWORD
  label: Admin Password
  default: admin
web_ui:
- name: Superset
  port: 8088
  path: /
  description: Apache Superset — data visualization and analytics
terminal:
  shell: /bin/bash
  welcome_message: Apache Superset container. Use superset CLI or curl to interact.
  quick_actions:
  - label: Health check
    command: curl -s http://localhost:8088/health
  - label: List databases
    command: curl -s http://localhost:8088/api/v1/database/ | python3 -m json.tool 2>/dev/null || curl -s http://localhost:8088/api/v1/database/
  - label: List dashboards
    command: curl -s http://localhost:8088/api/v1/dashboard/ | python3 -m json.tool 2>/dev/null || curl -s http://localhost:8088/api/v1/dashboard/
connections:
  provides: []
  accepts:
  - type: sql-query
    config_schema:
    - key: catalog
      label: Trino Catalog
      type: string
      default: iceberg
    - key: schema
      label: Default Schema
      type: string
      default: analytics
depends_on_components:
- trino
resource_weight: heavy
variants:
  default:
    description: Superset with SQLite metadata store (no external deps)
template_mounts: []
static_mounts: []
init_scripts: []
