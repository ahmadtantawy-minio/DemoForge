id: minio
name: MinIO Node
category: storage
icon: minio
version: latest
image: quay.io/minio/minio:latest
image_extra_refs:
  - quay.io/minio/aistor/minio:edge
  - quay.io/minio/aistor/minio:latest
image_size_mb: 110
description: S3-compatible high-performance object storage (CE or AIStor edition)
resources:
  memory: 256m
  cpu: 0.5
ports:
- name: api
  container: 9000
  protocol: tcp
- name: console
  container: 9001
  protocol: tcp
environment:
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
  MINIO_BROWSER_REDIRECT_URL: ''
  MINIO_PROMETHEUS_AUTH_TYPE: public
  MINIO_CALLHOME_ENABLE: '${MINIO_CALLHOME_ENABLE:-off}'
volumes:
- name: data
  path: /data
  size: 1g
command:
- server
- /data
- --console-address
- :9001
health_check:
  endpoint: /minio/health/live
  port: 9000
  interval: 10s
  timeout: 5s
secrets:
- key: MINIO_ROOT_USER
  label: Root User
  default: minioadmin
- key: MINIO_ROOT_PASSWORD
  label: Root Password
  default: minioadmin
web_ui:
- name: console
  port: 9001
  path: /
  description: MinIO Console — bucket management, monitoring, and admin
terminal:
  shell: /bin/sh
  welcome_message: MinIO container. 'mc' is available at /usr/bin/mc.
  quick_actions:
  - label: mc admin info
    command: mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc admin info local
  - label: mc ls
    command: mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc ls local
  - label: Create test bucket
    command: mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc mb local/test-bucket --ignore-existing
  - label: Tail logs
    command: tail -f /proc/1/fd/1
connections:
  provides:
  - type: s3
    port: 9000
    description: S3-compatible API endpoint
  - type: metrics
    port: 9000
    path: /minio/v2/metrics/cluster
    description: Prometheus metrics endpoint
  - type: replication
    port: 9000
    description: Bucket replication source
  - type: site-replication
    port: 9000
    description: Site replication peer
  - type: tiering
    port: 9000
    description: ILM tiering source (hot tier)
  - type: aistor-tables
    port: 9000
    description: AIStor Tables — direct Trino connection (requires aistor_tables_enabled)
  - type: webhook
    port: 9000
    description: Bucket event notifications to Event Processor (webhook edge)
    config_schema:
      - key: webhook_bucket
        label: Bucket
        type: string
        default: ""
        description: "Bucket to watch (empty = all buckets)"
      - key: webhook_prefix
        label: Prefix
        type: string
        default: ""
        description: Object key prefix filter
      - key: webhook_suffix
        label: Suffix
        type: string
        default: ""
        description: Object key suffix filter
      - key: webhook_events
        label: Events
        type: select
        description: "mc event add --event (put/get/delete; maps legacy s3:* names at deploy)"
        options:
          - "put"
          - "get"
          - "delete"
          - "put,delete"
          - "put,get,delete"
        default: "put"
  accepts:
  - type: load-balance
    config_schema: []
  - type: replication
    config_schema:
    - key: source_bucket
      label: Source Bucket
      type: string
      default: demo-bucket
    - key: target_bucket
      label: Target Bucket
      type: string
      default: demo-bucket
    - key: replication_mode
      label: Replication Mode
      type: select
      options:
      - async
      - sync
      default: async
    - key: bandwidth_limit
      label: Bandwidth Limit (MB/s)
      type: number
      default: '0'
      description: 0 = unlimited
  - type: site-replication
    config_schema: []
  - type: tiering
    config_schema:
    - key: policy_name
      label: ILM Policy Name
      type: string
      default: auto-tier
    - key: transition_days
      label: Transition After (days)
      type: number
      default: '30'
    - key: storage_class
      label: Target Storage Class
      type: select
      options:
      - STANDARD
      - REDUCED_REDUNDANCY
      default: STANDARD
  - type: file-push
    config_schema: []
  - type: structured-data
    config_schema:
    - key: target_bucket
      label: Target Bucket
      type: string
      default: data-lake
    - key: format
      label: File Format
      type: select
      options:
      - parquet
      - json
      - csv
      default: parquet
    - key: rows_per_file
      label: Rows per File
      type: number
      default: '1000'
    - key: rate
      label: Files per Minute
      type: number
      default: '1'
  - type: s3
  - type: failover
variants: {}
template_mounts: []
static_mounts: []
config:
  MINIO_EDITION:
    label: Edition
    type: select
    options:
      - ce
      - aistor
      - aistor-edge
    default: ce
    description: CE (Community), AIStor (Enterprise), or AIStor Edge (Enterprise)
init_scripts:
- command: sh -c 'until mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD 2>/dev/null; do sleep 2; done && mc mb local/demo-bucket --ignore-existing && mc mb local/data --ignore-existing'
  wait_for_healthy: true
  timeout: 60
  order: 1
  description: Create default buckets
license_requirements:
- license_id: minio-aistor-free
  label: AIStor Free
  description: Required for AIStor single-node deployments
  injection_type: env_var
  env_var: MINIO_LICENSE
  required: false
  edition: aistor
- license_id: minio-enterprise
  label: AIStor Enterprise
  description: Required for AIStor cluster deployments
  injection_type: env_var
  env_var: MINIO_LICENSE
  required: false
  edition: aistor
- license_id: minio-aistor-free
  label: AIStor Free (Edge)
  description: Required for AIStor Edge single-node deployments
  injection_type: env_var
  env_var: MINIO_LICENSE
  required: false
  edition: aistor-edge
- license_id: minio-enterprise
  label: AIStor Enterprise (Edge)
  description: Required for AIStor Edge cluster deployments
  injection_type: env_var
  env_var: MINIO_LICENSE
  required: false
  edition: aistor-edge
