id: minio
name: MinIO Object Store
category: storage
icon: minio
version: "latest"
image: minio/minio:latest
description: "S3-compatible high-performance object storage"

resources:
  memory: "256m"
  cpu: 0.5

ports:
  - name: api
    container: 9000
    protocol: tcp
  - name: console
    container: 9001
    protocol: tcp

environment:
  MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
  MINIO_BROWSER_REDIRECT_URL: ""

volumes:
  - name: data
    path: /data
    size: 1g

command: ["server", "/data", "--console-address", ":9001"]

health_check:
  endpoint: /minio/health/live
  port: 9000
  interval: 10s
  timeout: 5s

secrets:
  - key: MINIO_ROOT_USER
    label: "Root User"
    default: "minioadmin"
  - key: MINIO_ROOT_PASSWORD
    label: "Root Password"
    default: "minioadmin"

web_ui:
  - name: console
    port: 9001
    path: "/"
    description: "MinIO Console — bucket management, monitoring, and admin"

terminal:
  shell: /bin/sh
  welcome_message: "MinIO container. 'mc' is available at /usr/bin/mc."
  quick_actions:
    - label: "mc admin info"
      command: "mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc admin info local"
    - label: "mc ls"
      command: "mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc ls local"
    - label: "Create test bucket"
      command: "mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD && mc mb local/test-bucket --ignore-existing"

connections:
  provides:
    - type: s3
      port: 9000
      description: "S3-compatible API endpoint"
    - type: metrics
      port: 9000
      path: "/minio/v2/metrics/cluster"
      description: "Prometheus metrics endpoint"

variants:
  single:
    description: "Single node, single drive"
    command: ["server", "/data", "--console-address", ":9001"]
  distributed:
    description: "4-drive erasure coding (simulated)"
    command: ["server", "/data{1...4}", "--console-address", ":9001"]
  replication-source:
    description: "Replication source node"
    command: ["server", "/data", "--console-address", ":9001"]
  replication-target:
    description: "Replication target node"
    command: ["server", "/data", "--console-address", ":9001"]

template_mounts: []
static_mounts: []

init_scripts:
  - command: "sh -c 'until mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD 2>/dev/null; do sleep 2; done && mc mb local/demo-bucket --ignore-existing && mc mb local/data --ignore-existing'"
    wait_for_healthy: true
    timeout: 60
    order: 1
    description: "Create default buckets"
