id: nginx
name: NGINX
category: infra
icon: nginx
version: "latest"
image: nginx:latest
image_size_mb: 25
description: "High-performance load balancer and reverse proxy"

resources:
  memory: "128m"
  cpu: 0.25

ports:
  - name: http
    container: 80
    protocol: tcp
  - name: console
    container: 9001
    protocol: tcp
  - name: status
    container: 8080
    protocol: tcp

environment:
  NGINX_ENTRYPOINT_QUIET_LOGS: "1"

volumes: []

health_check:
  endpoint: /nginx_status
  port: 80
  interval: 10s
  timeout: 5s

secrets: []

web_ui:
  - name: console
    port: 9001
    path: "/"
    description: "MinIO Console (load-balanced across cluster nodes)"
  - name: status
    port: 80
    path: "/"
    description: "NGINX status page"

terminal:
  shell: /bin/sh
  welcome_message: "NGINX load balancer container."
  quick_actions:
    - label: "Test config"
      command: "nginx -t"
    - label: "Reload"
      command: "nginx -s reload"
    - label: "Active connections"
      command: "curl -s http://localhost/nginx_status"
    - label: "Tail access log"
      command: "tail -f /var/log/nginx/access.log"
    - label: "Tail error log"
      command: "tail -f /var/log/nginx/error.log"

connections:
  provides:
    - type: load-balance
      port: 80
      description: "Load-balanced endpoint"
      config_schema:
        - key: algorithm
          label: "Load Balance Algorithm"
          type: select
          options: ["round-robin", "least-conn", "ip-hash"]
          default: "round-robin"
        - key: backend_port
          label: "Backend Port"
          type: number
          default: "9000"
    - type: http
      port: 80
      description: "HTTP endpoint"
    - type: failover
      port: 80
      description: "Active-passive failover endpoint"
      config_schema: []
  accepts:
    - type: s3
      config_schema: []
    - type: http
      config_schema: []
    - type: file-push
      config_schema: []

variants:
  load-balancer:
    description: "Round-robin load balancer for upstream services"
  failover-proxy:
    description: "Active-passive failover proxy across two upstream sites with health-check-based routing"

template_mounts:
  - template: "nginx.conf.j2"
    mount_path: "/etc/nginx/conf.d/default.conf"

static_mounts: []

init_scripts:
  - command: "nginx -s reload"
    wait_for_healthy: true
    timeout: 30
    order: 10
    description: "Reload nginx with generated config"
