id: inference-sim
name: Inference Memory Simulator
category: simulation
icon: inference-sim
version: '1.0'
image: demoforge/inference-sim:latest
build_context: .
description: Simulates LLM inference KV cache lifecycle on two NVIDIA DGX H100 racks (16 GPUs, 8 replicas story) across the NVIDIA STX 5-tier memory hierarchy
resources:
  memory: 512m
  cpu: 0.5
ports:
- name: web
  container: 8095
  protocol: tcp
environment:
  MINIO_ENDPOINT_G35: ''
  MINIO_ENDPOINT_G4: ''
  MINIO_ACCESS_KEY: minioadmin
  MINIO_SECRET_KEY: minioadmin
  KV_BUCKET_HOT: kv-cache-hot
  KV_BUCKET_WARM: kv-cache-warm
  KV_BUCKET_COLD: kv-cache-cold
  G1_CAPACITY_GB: '80'
  # 225 GB/GPU => 1.8 TB usable per node (8 GPUs), with ~0.2 TB reserved for OS.
  G2_CAPACITY_GB: '225'
  G3_CAPACITY_GB: '4000'
  G35_CAPACITY_GB: '500000'
  G4_CAPACITY_GB: '1000000'
  NODE_COUNT: '2'
  GPUS_PER_NODE: '8'
  REPLICA_COUNT: '8'
  GPU_COUNT: '16'
  SIM_DEFAULT_USERS: '100'
  SIM_DEFAULT_CONTEXT: '65536'
  SIM_DEFAULT_SCENARIO: 'file-g4'
volumes: []
command: []
health_check:
  endpoint: /health
  port: 8095
  interval: 10s
  timeout: 5s
  start_period: 10s
secrets:
- key: MINIO_ACCESS_KEY
  label: MinIO Access Key
  default: minioadmin
- key: MINIO_SECRET_KEY
  label: MinIO Secret Key
  default: minioadmin
web_ui:
- name: simulation
  port: 8095
  path: /
  description: STX/CMX inference memory simulator
terminal:
  shell: /bin/sh
  welcome_message: Inference Memory Simulator.
  quick_actions:
  - label: Status
    command: wget -qO- http://localhost:8095/status 2>/dev/null || echo 'Not ready'
  - label: Start simulation
    command: wget -qO- --post-data='' http://localhost:8095/sim/start 2>/dev/null || echo 'Failed'
  - label: Stop simulation
    command: wget -qO- --post-data='' http://localhost:8095/sim/stop 2>/dev/null || echo 'Failed'
connections:
  provides:
  - type: metrics
    port: 8080
  accepts:
  - type: s3
    optional: true
    config_schema:
    - key: tier_role
      label: Storage Tier Role
      type: select
      options:
      - g35-cmx
      - g4-archive
      default: g35-cmx
      description: Which tier this MinIO instance represents
  - type: inference-api
    optional: true
variants:
  default:
    description: Full simulation with visualization UI
template_mounts: []
static_mounts: []
init_scripts:
- command: python3 -c "import urllib.request,sys; resp=urllib.request.urlopen('http://localhost:8095/health',timeout=10).read(); print('Simulator ready') if b'ok' in resp else sys.exit(1)"
  wait_for_healthy: true
  timeout: 30
  order: 1
  description: Wait for simulator to initialize
