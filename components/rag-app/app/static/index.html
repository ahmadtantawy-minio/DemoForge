<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Pipeline — Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: transparent; color: #e4e4e7; height: 100vh; display: flex; flex-direction: column; }
  .header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid #27272a; background: rgba(9,9,11,0.8); }
  .header h1 { font-size: 14px; font-weight: 600; }
  .status-dots { display: flex; gap: 6px; margin-left: auto; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #71717a; }
  .dot.ok { background: #22c55e; }
  .dot.warn { background: #eab308; animation: pulse 1.5s infinite; }
  .dot.err { background: #ef4444; }
  @keyframes pulse { 50% { opacity: 0.5; } }
  .toolbar { display: flex; gap: 6px; padding: 8px 16px; border-bottom: 1px solid #27272a; background: rgba(9,9,11,0.6); }
  .toolbar button { font-size: 11px; padding: 4px 10px; border-radius: 4px; border: 1px solid #3f3f46; background: #18181b; color: #a1a1aa; cursor: pointer; }
  .toolbar button:hover { background: #27272a; color: #e4e4e7; }
  .toolbar button.danger { color: #f87171; border-color: #7f1d1d; }
  .toolbar button.danger:hover { background: #7f1d1d; color: #fecaca; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
  .msg.user { align-self: flex-end; background: #1d4ed8; color: #dbeafe; border-bottom-right-radius: 2px; }
  .msg.assistant { align-self: flex-start; background: #27272a; border-bottom-left-radius: 2px; }
  .msg.system { align-self: center; background: transparent; color: #71717a; font-size: 11px; font-style: italic; }
  .sources { margin-top: 8px; }
  .sources summary { font-size: 11px; color: #a1a1aa; cursor: pointer; }
  .sources .src { font-size: 11px; color: #71717a; padding: 2px 0; }
  .sources .src .score { color: #3b82f6; }
  .thinking { display: flex; gap: 4px; padding: 10px 14px; align-self: flex-start; }
  .thinking span { width: 6px; height: 6px; background: #71717a; border-radius: 50%; animation: bounce 1.4s infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-8px); } }
  .input-bar { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid #27272a; background: rgba(9,9,11,0.8); }
  .input-bar input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #3f3f46; background: #18181b; color: #e4e4e7; font-size: 13px; outline: none; }
  .input-bar input:focus { border-color: #3b82f6; }
  .input-bar button { padding: 8px 16px; border-radius: 6px; border: none; background: #2563eb; color: white; font-size: 13px; font-weight: 500; cursor: pointer; }
  .input-bar button:hover { background: #1d4ed8; }
  .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
  .stats { font-size: 11px; color: #71717a; padding: 0 16px 4px; }
  input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="header">
  <h1>RAG Pipeline</h1>
  <div class="status-dots">
    <span class="dot" id="dot-minio" title="MinIO"></span>
    <span class="dot" id="dot-qdrant" title="Qdrant"></span>
    <span class="dot" id="dot-ollama" title="Ollama"></span>
  </div>
</div>
<div class="toolbar">
  <button onclick="loadSample()">Load sample docs</button>
  <button onclick="document.getElementById('file-input').click()">Upload document</button>
  <button class="danger" onclick="resetCollection()">Reset</button>
  <input type="file" id="file-input" onchange="uploadFile(this)" accept=".txt,.md,.pdf,.json">
</div>
<div class="stats" id="stats"></div>
<div class="messages" id="messages"></div>
<div class="input-bar">
  <input type="text" id="question" placeholder="Ask a question about your documents..." onkeydown="if(event.key==='Enter')sendQuestion()">
  <button onclick="sendQuestion()" id="send-btn">Send</button>
</div>
<script>
const msgs = document.getElementById('messages');
const statsEl = document.getElementById('stats');
let thinking = false;

function addMsg(role, text, sources) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let html = text.replace(/\n/g, '<br>');
  if (sources && sources.length) {
    html += '<details class="sources"><summary>' + sources.length + ' source(s)</summary>';
    sources.forEach(s => {
      html += '<div class="src">' + s.filename + ' <span class="score">(score: ' + s.score.toFixed(3) + ')</span></div>';
    });
    html += '</details>';
  }
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

async function sendQuestion() {
  if (thinking) return;
  const input = document.getElementById('question');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  addMsg('user', q);
  thinking = true;
  document.getElementById('send-btn').disabled = true;
  showThinking();
  try {
    const resp = await fetch('/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: q, top_k: 5})
    });
    const data = await resp.json();
    hideThinking();
    addMsg('assistant', data.answer, data.sources);
    if (data.latency_ms) {
      addMsg('system', 'Latency: ' + data.latency_ms + 'ms | Tokens: ' + (data.tokens || 0));
    }
  } catch (e) {
    hideThinking();
    addMsg('system', 'Error: ' + e.message);
  }
  thinking = false;
  document.getElementById('send-btn').disabled = false;
}

async function loadSample() {
  addMsg('system', 'Loading sample documents...');
  try {
    const resp = await fetch('/ingest/sample', {method: 'POST'});
    const data = await resp.json();
    addMsg('system', data.message);
    pollStatus();
  } catch (e) {
    addMsg('system', 'Error: ' + e.message);
  }
}

async function uploadFile(input) {
  if (!input.files.length) return;
  const file = input.files[0];
  addMsg('system', 'Uploading ' + file.name + '...');
  const formData = new FormData();
  formData.append('file', file);
  try {
    const resp = await fetch('/ingest/upload', {method: 'POST', body: formData});
    const data = await resp.json();
    addMsg('system', data.message);
    pollStatus();
  } catch (e) {
    addMsg('system', 'Error: ' + e.message);
  }
  input.value = '';
}

async function resetCollection() {
  if (!confirm('Reset the vector collection? This removes all ingested data.')) return;
  try {
    await fetch('/collection', {method: 'DELETE'});
    addMsg('system', 'Collection reset.');
    pollStatus();
  } catch (e) {
    addMsg('system', 'Error: ' + e.message);
  }
}

async function pollStatus() {
  try {
    const resp = await fetch('/health');
    const h = await resp.json();
    document.getElementById('dot-minio').className = 'dot ' + (h.minio_connected ? 'ok' : 'err');
    document.getElementById('dot-qdrant').className = 'dot ' + (h.qdrant_connected ? 'ok' : 'err');
    document.getElementById('dot-ollama').className = 'dot ' + (h.models_loaded ? 'ok' : 'warn');
  } catch {}
  try {
    const resp = await fetch('/status');
    const s = await resp.json();
    statsEl.textContent = s.documents_ingested + ' docs | ' + s.chunks_stored + ' chunks | ' + s.embedding_model + ' + ' + s.chat_model;
  } catch {}
}

pollStatus();
setInterval(pollStatus, 10000);
addMsg('system', 'Ready. Load sample docs or upload your own to get started.');
</script>
</body>
</html>
