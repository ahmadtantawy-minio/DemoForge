id: external-system
name: External System
category: cloud
icon: external-system
version: ""
image: ""
virtual: true
description: "Reference node representing an external service (AWS S3, GCS, Azure Blob, REST API, external Kafka, etc.). No container is deployed — configured endpoint details are injected into connected components via env vars."

properties:
  - key: EXTERNAL_ENDPOINT
    label: Endpoint URL
    type: string
    required: true
    description: "Full URL of the external service (e.g. https://s3.amazonaws.com or https://storage.googleapis.com)"
  - key: EXTERNAL_ACCESS_KEY
    label: Access Key / API Key
    type: string
    description: "Access key, API key, or username"
  - key: EXTERNAL_SECRET_KEY
    label: Secret Key / Password
    type: string
    description: "Secret key, API secret, or password"
  - key: EXTERNAL_BUCKET
    label: Bucket / Resource
    type: string
    description: "Default bucket, container, or resource name"
  - key: EXTERNAL_REGION
    label: Region
    type: string
    default: "us-east-1"
    description: "AWS region or equivalent (e.g. us-east-1, europe-west1)"

connections:
  provides:
    - type: s3
      port: 0
      description: "External S3-compatible storage (AWS S3, GCS, Azure Blob S3-compat)"
      env_map:
        - config_key: EXTERNAL_ENDPOINT
          env_var: S3_ENDPOINT
        - config_key: EXTERNAL_ACCESS_KEY
          env_var: S3_ACCESS_KEY
        - config_key: EXTERNAL_SECRET_KEY
          env_var: S3_SECRET_KEY
        - config_key: EXTERNAL_BUCKET
          env_var: S3_BUCKET
        - config_key: EXTERNAL_REGION
          env_var: AWS_DEFAULT_REGION
    - type: http
      port: 0
      description: "External HTTP/REST API endpoint"
      env_map:
        - config_key: EXTERNAL_ENDPOINT
          env_var: EXTERNAL_API_URL
        - config_key: EXTERNAL_ACCESS_KEY
          env_var: EXTERNAL_API_KEY
    - type: external-api
      port: 0
      description: "External API connection (generic REST/HTTP with auth)"
      env_map:
        - config_key: EXTERNAL_ENDPOINT
          env_var: EXTERNAL_API_URL
        - config_key: EXTERNAL_ACCESS_KEY
          env_var: EXTERNAL_API_KEY
        - config_key: EXTERNAL_SECRET_KEY
          env_var: EXTERNAL_API_SECRET
    - type: cluster-tiering
      port: 0
      description: "External cold storage tier for MinIO ILM cluster (AWS S3, GCS, Azure Blob)"
      env_map:
        - config_key: EXTERNAL_ENDPOINT
          env_var: MINIO_TIER_ENDPOINT
        - config_key: EXTERNAL_ACCESS_KEY
          env_var: MINIO_TIER_ACCESS_KEY
        - config_key: EXTERNAL_SECRET_KEY
          env_var: MINIO_TIER_SECRET_KEY
        - config_key: EXTERNAL_BUCKET
          env_var: MINIO_TIER_BUCKET
  accepts: []

terminal:
  shell: ""
  welcome_message: ""
  quick_actions: []

web_ui: []
ports: []
volumes: []
environment: {}
secrets: []
health_check: null
log_commands: []
template_mounts: []
static_mounts: []
init_scripts: []
