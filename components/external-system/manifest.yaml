id: external-system
name: External System
category: tooling
icon: external-system
version: '1.0'
image: demoforge/external-system:latest
build_context: .
description: "Scenario-driven data source that generates realistic data into MinIO AIStor. Represents an external system (firewall, threat intel feed, vulnerability scanner, etc.) that pushes data into the data lake."
resources:
  memory: 512m
  cpu: 0.5

environment:
  ES_SCENARIO: ""
  S3_ENDPOINT: "localhost:9000"
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
  METABASE_URL: "http://metabase:3000"
  TRINO_HOST: ""
  ICEBERG_CATALOG_URI: ""
  ICEBERG_SIGV4: "false"
  ES_STARTUP_DELAY: "0"

secrets:
  - key: S3_ACCESS_KEY
    label: S3 Access Key
    default: minioadmin
  - key: S3_SECRET_KEY
    label: S3 Secret Key
    default: minioadmin

connections:
  provides:
    - type: s3
      port: 0
      description: "External S3-compatible data source (pushes data into S3 target)"
      env_map:
        - config_key: S3_ENDPOINT
          env_var: S3_ENDPOINT
        - config_key: S3_ACCESS_KEY
          env_var: S3_ACCESS_KEY
        - config_key: S3_SECRET_KEY
          env_var: S3_SECRET_KEY
    - type: aistor-tables
      port: 0
      description: "Pushes data into AIStor Tables (Iceberg catalog) on the connected MinIO"
      env_map:
        - config_key: S3_ENDPOINT
          env_var: S3_ENDPOINT
        - config_key: S3_ACCESS_KEY
          env_var: S3_ACCESS_KEY
        - config_key: S3_SECRET_KEY
          env_var: S3_SECRET_KEY
  accepts: []

terminal:
  shell: /bin/sh
  welcome_message: "External System Scenario Engine"
  quick_actions:
    - label: Check status
      command: ps aux | grep run.py

web_ui: []
ports: []
volumes: []
init_scripts: []
log_commands: []
template_mounts: []

static_mounts:
  - host_path: "./scenarios"
    mount_path: "/scenarios"

health_check: null
