id: redpanda
name: Redpanda
category: streaming
icon: redpanda
version: latest
image: demoforge/redpanda:latest
image_size_mb: 200
build_context: .
description: Kafka-compatible streaming platform — single binary, no ZooKeeper
resources:
  memory: 512m
  cpu: 0.5
ports:
- name: kafka
  container: 9092
  protocol: tcp
- name: schema-registry
  container: 8081
  protocol: tcp
- name: admin
  container: 9644
  protocol: tcp
- name: proxy
  container: 8082
  protocol: tcp
environment: {}
command: []
health_check:
  endpoint: /v1/status/ready
  port: 9644
  interval: 10s
  timeout: 5s
  start_period: 15s
web_ui: []
terminal:
  shell: /bin/bash
  welcome_message: Redpanda — Kafka-compatible streaming. Use 'rpk' CLI.
  quick_actions:
  - label: rpk topic list
    command: rpk topic list
  - label: rpk cluster info
    command: rpk cluster info
  - label: Create topic
    command: rpk topic create demo-topic --partitions 3 --replicas 1
  - label: rpk topic describe demo-topic
    command: rpk topic describe demo-topic
connections:
  provides:
  - type: kafka
    port: 9092
    description: Kafka-compatible broker endpoint
  - type: schema-registry
    port: 8081
    description: Schema Registry endpoint
  accepts:
  - type: kafka
variants:
  default:
    description: Single-node Redpanda in dev-container mode
template_mounts: []
static_mounts: []
init_scripts: []
