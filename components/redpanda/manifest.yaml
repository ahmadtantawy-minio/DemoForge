id: redpanda
name: Redpanda
category: streaming
icon: redpanda
version: "latest"
image: docker.redpanda.com/redpandadata/redpanda:latest
description: "Kafka-compatible streaming platform — single binary, no ZooKeeper"

resources:
  memory: "512m"
  cpu: 0.5

ports:
  - name: kafka
    container: 9092
    protocol: tcp
  - name: schema-registry
    container: 8081
    protocol: tcp
  - name: admin
    container: 9644
    protocol: tcp
  - name: proxy
    container: 8082
    protocol: tcp

environment: {}

command: ["redpanda", "start", "--overprovisioned", "--smp", "1", "--memory", "512M", "--reserve-memory", "0M", "--node-id", "0", "--kafka-addr", "internal://0.0.0.0:9092,external://0.0.0.0:19092", "--advertise-kafka-addr", "internal://redpanda:9092,external://localhost:19092", "--schema-registry-addr", "internal://0.0.0.0:8081,external://0.0.0.0:18081", "--pandaproxy-addr", "internal://0.0.0.0:8082,external://0.0.0.0:18082", "--mode", "dev-container", "--default-log-level=warn"]

health_check:
  endpoint: /v1/status/ready
  port: 9644
  interval: 10s
  timeout: 5s

web_ui: []

terminal:
  shell: /bin/bash
  welcome_message: "Redpanda — Kafka-compatible streaming. Use 'rpk' CLI."
  quick_actions:
    - label: "rpk topic list"
      command: "rpk topic list"
    - label: "rpk cluster info"
      command: "rpk cluster info"
    - label: "Create topic"
      command: "rpk topic create demo-topic --partitions 3 --replicas 1"
    - label: "rpk topic describe demo-topic"
      command: "rpk topic describe demo-topic"

connections:
  provides:
    - type: kafka
      port: 9092
      description: "Kafka-compatible broker endpoint"
    - type: schema-registry
      port: 8081
      description: "Schema Registry endpoint"
  accepts: []

variants:
  default:
    description: "Single-node Redpanda in dev-container mode"

template_mounts: []
static_mounts: []
init_scripts: []
