id: event-bridge
name: MinIO Event Bridge
category: integration
icon: event-bridge
image: localhost:5000/demoforge-event-bridge:latest
build_context: "."
image_size_mb: 50
description: "Webhook relay that receives MinIO bucket notifications and republishes them as Kafka-compatible REST events to Solace PubSub+. Completes the event mesh feedback loop."
resource_weight: light
depends_on_components:
  - solace-pubsub

ports:
  - name: webhook
    container: 3500
    protocol: tcp

environment:
  SOLACE_REST_URL: "http://localhost:8008"
  SOLACE_TOPIC_PREFIX: "minio/events"
  WEBHOOK_PORT: "3500"
  LOG_LEVEL: info

health_check:
  endpoint: /health
  port: 3500
  interval: "10s"
  timeout: "3s"
  start_period: "10s"
  retries: 5

connections:
  accepts:
    - type: webhook
      description: MinIO bucket notification webhooks
  provides:
    - type: event-stream
      port: 3500
      description: Webhook receiver

variants:
  default:
    description: Lightweight webhook-to-event relay
template_mounts: []
static_mounts: []
init_scripts: []
