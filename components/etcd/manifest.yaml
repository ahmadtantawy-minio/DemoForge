id: etcd
name: etcd
category: infrastructure
icon: etcd
version: "latest"
image: quay.io/coreos/etcd:v3.5.16
description: "Distributed key-value store (required by Milvus)"

resources:
  memory: "256m"
  cpu: 0.25

ports:
  - name: client
    container: 2379
    protocol: tcp

environment:
  ETCD_AUTO_COMPACTION_MODE: "revision"
  ETCD_AUTO_COMPACTION_RETENTION: "1000"
  ETCD_QUOTA_BACKEND_BYTES: "4294967296"
  ETCD_SNAPSHOT_COUNT: "50000"

volumes:
  - name: data
    path: /etcd
    size: 1g

command: ["etcd",
          "-advertise-client-urls=http://127.0.0.1:2379",
          "-listen-client-urls=http://0.0.0.0:2379",
          "--data-dir=/etcd",
          "--initial-advertise-peer-urls=http://127.0.0.1:2380",
          "-listen-peer-urls=http://0.0.0.0:2380",
          "--initial-cluster=default=http://127.0.0.1:2380"]

health_check:
  endpoint: /health
  port: 2379
  interval: 10s
  timeout: 5s
  start_period: "10s"

secrets: []
web_ui: []

terminal:
  shell: /bin/sh
  welcome_message: "etcd container."
  quick_actions:
    - label: "Health check"
      command: "wget -qO- http://localhost:2379/health 2>/dev/null || echo 'Not ready'"

connections:
  provides:
    - type: etcd
      port: 2379
      description: "etcd client endpoint"
  accepts: []

variants:
  default:
    description: "Single-node etcd"

template_mounts: []
static_mounts: []
init_scripts: []
