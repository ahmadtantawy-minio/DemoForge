# docker-compose.yml — runs DemoForge itself
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9210:9210"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # Docker-in-Docker control
      - ./components:/app/components:ro              # Component manifests
      - ./demos:/app/demos                           # Saved demo definitions
      - ./data:/app/data                             # Runtime state
      - ./demo-templates:/app/demo-templates           # Demo templates (rw so dev mode can promote overrides back to source)
      - ./user-templates:/app/user-templates           # SE-saved templates, rw
      - ./synced-templates:/app/synced-templates        # Remote sync target, rw
      - ./backend/app:/app/app                        # Backend source (live reload)
      - ./component-readiness.yaml:/app/component-readiness.yaml  # Component readiness config
    environment:
      - DEMOFORGE_COMPONENTS_DIR=/app/components
      - DEMOFORGE_DEMOS_DIR=/app/demos
      - DEMOFORGE_DATA_DIR=/app/data
      - DEMOFORGE_TEMPLATES_DIR=/app/demo-templates
      - DEMOFORGE_USER_TEMPLATES_DIR=/app/user-templates
      - DEMOFORGE_SYNCED_TEMPLATES_DIR=/app/synced-templates
      - DEMOFORGE_SYNC_ENABLED=${DEMOFORGE_SYNC_ENABLED:-false}
      - DEMOFORGE_SYNC_ENDPOINT=${DEMOFORGE_SYNC_ENDPOINT:-http://localhost:9000}
      - DEMOFORGE_SYNC_BUCKET=${DEMOFORGE_SYNC_BUCKET:-demoforge-templates}
      - DEMOFORGE_SYNC_PREFIX=${DEMOFORGE_SYNC_PREFIX:-templates/}
      - DEMOFORGE_SYNC_ACCESS_KEY=${DEMOFORGE_SYNC_ACCESS_KEY:-}
      - DEMOFORGE_SYNC_SECRET_KEY=${DEMOFORGE_SYNC_SECRET_KEY:-}
      - DEMOFORGE_REGISTRY_HOST=host.docker.internal:5000
      - DEMOFORGE_REGISTRY_PUSH_HOST=${DEMOFORGE_REGISTRY_PUSH_HOST:-}
      - DEMOFORGE_FA_ID=${DEMOFORGE_FA_ID:-}
      - DEMOFORGE_MODE=${DEMOFORGE_MODE:-standard}
      - DEMOFORGE_API_KEY=${DEMOFORGE_API_KEY:-}
      - DEMOFORGE_HUB_CONNECTOR_URL=${DEMOFORGE_HUB_CONNECTOR_URL:-http://host.docker.internal:8080}
      - DEMOFORGE_READINESS_CONFIG=/app/component-readiness.yaml
      # IMPORTANT: These must resolve to the DemoForge project root, not a subdirectory.
      # The backend auto-detects the correct paths from docker.sock if these are wrong.
      - DEMOFORGE_HOST_COMPONENTS_DIR=${PWD}/components
      - DEMOFORGE_HOST_DATA_DIR=${PWD}/data
    labels:
      - "demoforge.role=backend"                     # So we can find ourselves

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:9210
