# docker-compose.dev.yml — Dev mode hot-reload overrides
# Applied automatically by demoforge-dev.sh when DEMOFORGE_MODE=dev.
# Layered on top of docker-compose.yml via: docker compose -f docker-compose.yml -f docker-compose.dev.yml
#
# Dev mode uses ports 9211 (backend) and 3001 (frontend) so a dev instance and an FA
# instance can run simultaneously on the same machine without port conflicts.
services:
  hub-api:
    profiles: ["local-hub"]   # only started when DEMOFORGE_HUB_LOCAL=1 (make dev-start)
    build:
      context: ./hub-api
      dockerfile: Dockerfile
    command: ["uvicorn", "hub_api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--log-level", "info"]
    ports:
      - "8000:8000"
    volumes:
      - ./hub-api:/app
      - ./data/hub-api:/data/hub-api
    environment:
      - HUB_API_ADMIN_API_KEY=${DEMOFORGE_HUB_API_ADMIN_KEY:-}
      - HUB_API_DATABASE_PATH=/data/hub-api/demoforge-hub.db

  backend:
    # Enable uvicorn --reload on port 9211 (dev port, avoids conflict with FA on 9210)
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "9211", "--reload"]
    # Replace base compose ports so we do not merge 9210:9210 with 9211:9211
    ports: !override
      - "9211:9211"

  frontend:
    # Vite HMR (stage `dev`). demoforge.sh also runs: docker compose build --target dev frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    # Replace base 3000:3000 — Vite listens on 3001 only; merged ports would leave a dead :3000 publish
    ports: !override
      - "3001:3001"
    environment:
      # Same-origin API via Vite proxy (/api, /proxy → backend) — avoids CORS to :9211
      - VITE_PORT=3001
      - VITE_BACKEND_URL=http://backend:9211
    # Source files mounted for HMR; node_modules stays from the image layer
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/public:/app/public
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/components:/app/components
