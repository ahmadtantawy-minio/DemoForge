_template:
  name: 'NVIDIA STX: inside inference memory'
  tier: experience
  mode: experience
  category: simulation
  tags:
  - nvidia
  - stx
  - cmx
  - inference
  - kv-cache
  - memory-hierarchy
  - bluefield-4
  description: Interactive simulation of the NVIDIA STX/CMX inference memory architecture.
    Visualizes how KV cache blocks flow through 5 memory tiers during LLM inference,
    and demonstrates why the G3.5 context memory tier (MinIO AIStor) dramatically
    improves throughput.
  objective: Explain the NVIDIA STX architecture and demonstrate MinIO AIStor's role
    as the G3.5 context memory tier for agentic AI inference
  minio_value: MinIO AIStor operates as the G3.5 context memory storage tier in the
    NVIDIA STX architecture, providing petabyte-scale, high-bandwidth KV cache storage
    between local NVMe and enterprise storage.
  estimated_resources:
    memory: 2.5GB
    cpu: 2.5
    containers: 6
  walkthrough:
  - step: Deploy the simulation
    description: Click Deploy. The GPU server, inference client, two MinIO tiers,
      and monitoring start up.
  - step: Open the simulation
    description: Click 'Simulation' on the Inference Simulator node inside the GPU
      Server group.
  - step: Run with CMX enabled
    description: Click 'Multi-turn chat burst'. Watch blocks flow through all 5 tiers.
      GPU utilization stays high.
  - step: Toggle CMX off
    description: Flip the G3.5 CMX toggle. Blocks skip MinIO and dump to G4. Recomputations
      spike.
  - step: Check MinIO Console
    description: Open MinIO Console for the G3.5 instance. See real KV cache objects
      appearing.
  external_dependencies: []
