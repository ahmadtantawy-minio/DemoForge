annotations:
- id: ann-arch
  position:
    x: -300.0
    y: -5.437865080412621
  width: 260
  title: NVIDIA STX architecture
  body: 'STX is a modular reference architecture for AI inference storage, built on
    **BlueField-4** processors and **NVIDIA H100 SXM**-class GPU memory (HBM3 + system DRAM
    + local NVMe per GPU in the simulator).


    This demo walks through **three storage scenarios**: File/POSIX (NFS/Lustre baseline),
    **MinIO S3** on G4, then **MinIO G4 + G3.5 NVMe-oF/RDMA** — each step reduces I/O wait
    and recompute while lifting effective inference.'
  style: info
  step_number: null
  pointer_target: null
  collapsed: false
- id: ann-connectivity
  position:
    x: -314.86153846153843
    y: 626.1384615384616
  width: 350
  title: Why G3.5 is faster than G4
  body: 'G3.5 uses **NVMe-oF over RDMA** via BlueField-4 and Spectrum-X Ethernet —
    **800 Gb/s** with sub-millisecond latency.


    G4 uses standard **S3 over TCP** — 10-100x slower. Without G3.5, every cross-GPU
    cache miss means a full recomputation.'
  style: callout
  step_number: null
  pointer_target: null
  collapsed: false
- id: ann-gpu-isolation
  position:
    x: 783.4486313124647
    y: -22.432481964386568
  width: 240
  title: GPU memory is isolated
  body: 'Each **H100 SXM** accelerator (GPU A / GPU B) has its own G1/G2/G3 memory (HBM3, system DRAM, local
    NVMe). **GPU B** cannot access **GPU A**''s HBM directly.


    G3.5 (MinIO CMX) bridges this gap — shared, pod-level storage both GPUs can access.'
  style: callout
  step_number: null
  pointer_target: null
  collapsed: false
- id: ann-step1
  position:
    x: 12.30384145233262
    y: 30.770331013619256
  width: 200
  title: Start here
  body: Deploy, then click **Simulation** on the inference node.
  style: step
  step_number: 1
  pointer_target: sim-1
  collapsed: false
- id: ann-step2
  position:
    x: 770.3070500325858
    y: 175.38683294216656
  width: 220
  title: Step through the scenarios
  body: 'Use the **scenario cards** in the simulator: **File / POSIX Storage** → **G4 as
    MinIO Object Store** → **MinIO G4 S3 + G3.5 CTX RDMA**. Each switch is live — watch **GPU
    busy**, **effective inference**, **TTFT**, **recomputations** (rate suffix), and **G4 avg
    response** update immediately.'
  style: step
  step_number: 2
  pointer_target: null
  collapsed: false
- id: ann-g35
  position:
    x: -231.59999999999997
    y: 430.9846153846154
  width: 260
  title: The G3.5 tier — MinIO AIStor
  body: 'Runs on BlueField-4 with **800Gb/s** connectivity. Provides petabyte-scale
    KV cache with **sub-millisecond** access via RDMA.


    The simulation writes **real S3 objects** to this instance.'
  style: callout
  step_number: null
  pointer_target: minio-g35
  collapsed: false
- id: ann-g4
  position:
    x: 1212.9730844198698
    y: 424.77837590178063
  width: 240
  title: G4 — enterprise storage
  body: 'Long-term archival tier for cold KV cache. Higher latency than G3.5.


    Without G3.5, blocks evict straight to G4 — more **I/O wait** and **recompute** on the GPUs.'
  style: info
  step_number: null
  pointer_target: minio-g4
  collapsed: false
- id: ann-step3
  position:
    x: -486.94615384615383
    y: 427.5923076923077
  width: 240
  title: See real S3 ops
  body: Open **MinIO Console** for the G3.5 instance (Scenario 3 only). Watch KV cache
    objects appear and disappear as RDMA-backed restores run.
  style: step
  step_number: 3
  pointer_target: minio-g35
  collapsed: false
- id: ann-client
  position:
    x: -298.0692307692308
    y: 250.0307692307692
  width: 220
  title: Inference workload
  body: Simulates multi-turn chat sessions, agentic reasoning, and code generation
    requests hitting the GPU server.
  style: info
  step_number: null
  pointer_target: inference-client
  collapsed: false
- id: ann-claim
  position:
    x: 1213.3225720991431
    y: 606.7126930573716
  width: 350
  title: Performance claim
  body: 'NVIDIA reports **up to 5x tokens/sec** and **5x power efficiency** with CMX
    vs traditional storage.


    This simulation models the architectural reason: eliminating KV cache recomputation
    by keeping context in a fast, accessible tier.'
  style: warning
  step_number: null
  pointer_target: null
  collapsed: false
