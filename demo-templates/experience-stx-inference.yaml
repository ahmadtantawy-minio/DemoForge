annotations:
- id: ann-arch
  position:
    x: -300
    y: 30
  width: 260
  title: NVIDIA STX architecture
  body: 'STX is a modular reference architecture for AI inference storage, built on **BlueField-4** processors.


    This demo walks through **three storage tiers**: File/POSIX (NFS/Lustre baseline), MinIO S3 over TCP, and MinIO with **G3.5 NVMe-oF/RDMA** — showing how each upgrade compounds GPU throughput.'
  style: info
- id: ann-connectivity
  position:
    x: -280.86153846153843
    y: 658.1384615384616
  width: 350
  title: Why G3.5 is faster than G4
  body: 'G3.5 uses **NVMe-oF over RDMA** via BlueField-4 and Spectrum-X Ethernet — **800 Gb/s** with sub-millisecond latency.


    G4 uses standard **S3 over TCP** — 10-100x slower. Without G3.5, every cross-GPU cache miss means a full recomputation.'
  style: callout
- id: ann-gpu-isolation
  position:
    x: 800
    y: 50
  width: 240
  title: GPU memory is isolated
  body: 'Each GPU has its own G1/G2/G3 memory. GPU-B **cannot access** GPU-A''s HBM directly.


    G3.5 (MinIO CMX) bridges this gap — shared, pod-level storage both GPUs can access.'
  style: callout
- id: ann-step1
  position:
    x: 12.30384145233262
    y: 30.770331013619256
  width: 200
  title: Start here
  body: Deploy, then click **Simulation** on the inference node.
  style: step
  step_number: 1
  pointer_target: sim-1
- id: ann-step2
  position:
    x: 794.4692307692308
    y: 265.5923076923077
  width: 220
  title: Step through the scenarios
  body: 'Use the **Scenario** buttons in the simulation UI to progress: **File/POSIX → MinIO S3 → MinIO + RDMA**. Each switch is live — watch GPU utilization and recomputations respond immediately.'
  style: step
  step_number: 2
- id: ann-g35
  position:
    x: -183.59999999999997
    y: 454.9846153846154
  width: 260
  title: The G3.5 tier — MinIO AIStor
  body: 'Runs on BlueField-4 with **800Gb/s** connectivity. Provides petabyte-scale KV cache with **sub-millisecond** access via RDMA.


    The simulation writes **real S3 objects** to this instance.'
  style: callout
  pointer_target: minio-g35
- id: ann-g4
  position:
    x: 950
    y: 450
  width: 240
  title: G4 — enterprise storage
  body: 'Long-term archival tier for cold KV cache. Higher latency than G3.5.


    Without CMX, blocks evict directly here, causing **recomputation stalls**.'
  style: info
  pointer_target: minio-g4
- id: ann-step3
  position:
    x: -464.94615384615383
    y: 427.5923076923077
  width: 240
  title: See real S3 ops
  body: Open **MinIO Console** for the G3.5 instance (Scenario 3 only). Watch KV cache objects appear and disappear as RDMA-backed restores run.
  style: step
  step_number: 3
  pointer_target: minio-g35
- id: ann-client
  position:
    x: -298.0692307692308
    y: 250.0307692307692
  width: 220
  title: Inference workload
  body: Simulates multi-turn chat sessions, agentic reasoning, and code generation requests hitting the GPU server.
  style: info
  pointer_target: inference-client
- id: ann-claim
  position:
    x: 944.6846153846154
    y: 624.2153846153846
  width: 350
  title: Performance claim
  body: 'NVIDIA reports **up to 5x tokens/sec** and **5x power efficiency** with CMX vs traditional storage.


    This simulation models the architectural reason: eliminating KV cache recomputation by keeping context in a fast, accessible tier.'
  style: warning
