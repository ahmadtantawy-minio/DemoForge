_template:
  name: 'NVIDIA STX: Storage Tier Comparison'
  tier: experience
  mode: experience
  category: simulation
  tags:
  - nvidia
  - stx
  - cmx
  - inference
  - kv-cache
  - memory-hierarchy
  - bluefield-4
  description: 'Three-scenario demo of NVIDIA STX inference storage: File/POSIX/NFS baseline → MinIO S3 over TCP → MinIO S3 + G3.5 NVMe-oF/RDMA via BlueField-4. Shows how storage modernization compounds GPU utilization gains.'
  objective: Demonstrate how each storage tier upgrade — from legacy file protocols to MinIO S3 to MinIO with RDMA — compounds GPU throughput and eliminates KV cache recomputation stalls
  minio_value: MinIO AIStor serves dual roles in the NVIDIA STX architecture — as the G4 archive tier (S3/TCP) and as the G3.5 context memory tier (NVMe-oF/RDMA via BlueField-4), providing petabyte-scale KV cache storage at sub-millisecond latency.
  estimated_resources:
    memory: 2.5GB
    cpu: 2.5
    containers: 6
  walkthrough:
  - step: Deploy the simulation
    description: Click Deploy. The GPU server, inference client, two MinIO tiers, and monitoring start up.
  - step: Open the simulation
    description: Click 'Simulation' on the Inference Simulator node inside the GPU Server group.
  - step: Scenario 1 — File/POSIX baseline
    description: The simulation starts in File/POSIX mode (NFS/Lustre). Watch GPU utilization and recomputation rate. This is the legacy baseline.
  - step: Switch to Scenario 2 — MinIO S3
    description: Click 'MinIO S3 / TCP' in the scenario panel. KV cache now offloads to MinIO over standard S3. Recomputations drop and GPU utilization improves.
  - step: Switch to Scenario 3 — MinIO + RDMA
    description: Click 'MinIO + RDMA (G3.5)' to enable the BlueField-4 NVMe-oF path. Cross-GPU restores become near-instant. Watch utilization climb to its peak.
  - step: Read the chart
    description: The chart background is color-coded by scenario. Compare each band side-by-side to see the compounding effect of each storage tier upgrade.
  external_dependencies: []
