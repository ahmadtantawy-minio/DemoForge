_template:
  name: 'NVIDIA STX: Storage Tier Comparison'
  tier: experience
  mode: experience
  category: simulation
  tags:
  - nvidia
  - stx
  - cmx
  - inference
  - kv-cache
  - memory-hierarchy
  - bluefield-4
  - h100-sxm
  description: 'Dual **NVIDIA H100 SXM** GPUs (2×) with per-GPU tiers **G1 80 GB HBM3,
    G2 512 GB system DRAM, G3 4 TB local NVMe**, shared **G4 50 GB** (simulation scale),
    and MinIO G3.5/G4. Three scenarios: **File/POSIX** baseline → **MinIO S3 (G4)** →
    **MinIO G4 + G3.5 RDMA** — storage modernization compounding GPU busy time, TTFT,
    recompute rate, and G4 restore latency.'
  objective: Show how each storage upgrade reduces **I/O wait** and **recompute** while
    increasing **effective inference** (vs raw GPU busy time), using live metrics, stacked
    GPU utilization, G4 avg response, and optional chart view.
  minio_value: MinIO AIStor serves dual roles in NVIDIA STX — **G4** archive (S3/TCP)
    and **G3.5** context memory (NVMe-oF/RDMA on BlueField-4), giving petabyte-scale KV
    storage with sub-millisecond class access on the RDMA path.
  estimated_resources:
    memory: 3GB
    cpu: 2.5
    containers: 6
  walkthrough:
  - step: Deploy the simulation
    description: Click **Deploy**. Brings up the **GPU Server (dual H100 SXM)** group,
      inference client, **Inference Simulator** (with tier capacities above), two MinIO
      clusters, and Prometheus.
  - step: Open the simulation
    description: Click **Simulation** on the **Inference Simulator** node. The UI opens
      with scenario **File / POSIX Storage** selected by default.
  - step: Scenario 1 — File / POSIX baseline
    description: 'Run **Start**. Watch **GPU busy %**, stacked bar (inference vs I/O wait
      vs recompute), **Avg TTFT**, **Recomputations** (with / SEC or / MIN rate), and the
      **G4 avg response** line in the shared-storage warning. This is the POSIX pain baseline.'
  - step: Switch to Scenario 2 — G4 as MinIO Object Store
    description: In the simulator, pick **G4 as MinIO Object Store**. Same G4 tier as
      S3-native object storage — lower I/O wait, fewer recomputations, better TTFT vs POSIX.
  - step: Switch to Scenario 3 — MinIO G4 + G3.5 CTX RDMA
    description: Pick **MinIO G4 S3 + G3.5 CTX RDMA** so G3.5 (CMX) is on. Cross-GPU
      restores use the fast path; I/O wait and recompute drop toward the floor.
  - step: Reset and defaults
    description: Use **Reset** (confirms first) to wipe sim state, clear charts/events,
      and restore **default env** on the server — including scenario and capacity overrides
      from this demo''s node **config** when saved as a template.
  - step: Read the chart
    description: Toggle the chart icon for time series. Background bands follow scenario
      switches — compare TTFT, recompute deltas, sessions, and GPU busy % across runs.
  external_dependencies: []
  fa_ready: true
