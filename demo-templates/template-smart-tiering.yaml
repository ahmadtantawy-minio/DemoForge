_template:
  name: Smart data tiering
  tier: essentials
  category: infrastructure
  tags:
  - ilm
  - tiering
  - hot-cold
  - lifecycle
  - cost-optimization
  - monitoring
  description: Two MinIO clusters — hot (NVMe, 2-node) and cold (HDD, 2-node) — connected
    by ILM remote tiering. Data lands on the fast hot cluster and automatically transitions
    to the cost-effective cold cluster based on age policies.
  objective: Demonstrate MinIO's ILM tiering between clusters — hot NVMe for active
    data, cold HDD for aged data, transparent to applications
  minio_value: MinIO's ILM tiering lets you mix storage tiers without changing your
    applications. Hot data gets NVMe performance, cold data gets HDD economics, and
    the transition is automatic and transparent.
  estimated_resources:
    memory: 4GB
    cpu: 4
    containers: 9
  external_dependencies: []
  walkthrough:
  - step: Deploy the demo
    description: Click Deploy. Two MinIO clusters start — hot tier (NVMe) and cold
      tier (HDD), each with 2 erasure-coded nodes and an auto-generated load balancer,
      plus data generator and monitoring.
  - step: Generate data on hot tier
    description: The data generator is already pushing files to the hot cluster. Open
      the hot cluster's MinIO Console to see objects arriving in the data bucket.
  - step: Review ILM tiering config
    description: Open the hot cluster's MinIO Console → Buckets → data → Lifecycle.
      The auto-tier rule is already configured — objects older than 7 days transition
      to COLD-TIER.
  - step: Watch data migrate
    description: After the transition period elapses, objects move from the hot cluster
      to the cold cluster. Open the cold cluster's Console to see them appear in the
      tiered bucket.
  - step: Verify transparency
    description: Read objects through the hot-tier endpoint — they're served transparently
      even though the data now lives on the cold cluster. The application doesn't
      know.
  - step: Monitor tiering metrics
    description: Open Grafana dashboards to see ingest rates, tiering throughput,
      and storage utilization on both clusters in real time.
  se_guide:
    pitch: Show how MinIO ILM policies automate hot-to-cold data migration — expensive
      NVMe for active data, cheap HDD for archives — with zero application changes
      and seamless access throughout.
    audience: Infrastructure architects, storage admins, and cost-conscious IT leaders
      evaluating TCO reduction through tiered storage.
    talking_points:
    - MinIO ILM policies are set once and run forever — you define 'move objects older
      than 7 days to cold tier' and MinIO handles it automatically with no cron jobs,
      no scripts.
    - The application doesn't know or care which tier the data is on — reads go through
      the same S3 endpoint regardless of whether the object is on NVMe or HDD.
    - 'This demo runs two real MinIO clusters: a 2-node erasure-coded hot tier for
      active data ingest, and a 2-node cold tier for low-cost archival. Both are fully
      functional MinIO deployments.'
    - 'The financial story is straightforward: NVMe costs roughly 5-10x more per GB
      than HDD. For data accessed infrequently after 30 days, automatic tiering can
      cut your storage bill by 60-80%.'
    - MinIO also supports tiering to public cloud — S3, GCS, Azure Blob — so your
      cold tier can be a cloud object store while hot data stays on-prem.
    demo_flow:
    - step: 1
      action: Click Deploy and wait for all 9 containers to go green — data generator,
        hot cluster (2 nodes + LB), cold cluster (2 nodes + LB), Prometheus, Grafana.
      say: This is a realistic enterprise topology — a 2-node erasure-coded hot tier
        for high-throughput ingest, and a separate 2-node cold cluster for archival.
        All ILM configuration is automated on deploy.
    - step: 2
      action: Show the data generator pushing files to the hot cluster. Open the hot
        cluster's MinIO Console.
      say: Data is landing on the hot tier — files distributed across both NVMe nodes
        with erasure coding for redundancy.
    - step: 3
      action: Open MinIO Console on the hot cluster → Buckets → data → Lifecycle tab.
        Show the auto-tier ILM rule.
      say: 'This ILM rule says: after 7 days, transition objects in the data bucket
        to COLD-TIER. One rule, set once, runs forever. No scripts, no cron jobs.'
    - step: 4
      action: Open Grafana and show the ingest rate dashboard.
      say: You can see bytes written to the hot tier, objects transitioned to cold,
        and storage distribution across both clusters — all in real time.
    - step: 5
      action: Open the cold cluster's MinIO Console to show transitioned objects.
      say: Objects moved from hot to cold are still fully accessible via the same
        S3 API — applications read them transparently without knowing they moved.
    common_questions:
    - q: What happens if the cold tier is unavailable — can we still read hot data?
      a: Yes — the hot and cold tiers are independent MinIO clusters. A cold tier
        outage doesn't affect hot tier availability. Objects still on the hot tier
        are fully accessible.
    - q: Can we tier to cloud instead of a second on-prem cluster?
      a: Absolutely. MinIO supports tiering targets of AWS S3, GCS, and Azure Blob
        Storage. Your cold tier can be cloud object storage while hot data stays on-prem
        for performance and cost control.
    - q: How does MinIO handle reads of cold-tiered objects — is there a restore step
        like S3 Glacier?
      a: No restore step. MinIO tiering uses standard S3 object storage on the cold
        side — reads are immediate, just slower due to HDD vs NVMe. There's no Glacier-style
        retrieval delay.
    - q: Can ILM policies be set per-prefix, not just per-bucket?
      a: Yes — ILM rules can target specific prefixes within a bucket, so you can
        tier logs after 30 days, raw data after 7 days, and keep processed data hot
        indefinitely, all within the same bucket.
    mc_commands:
    - label: Check ILM policy on hot tier
      command: mc ilm rule ls hot/data
      context: Shows the auto-tier transition rule configured on the data bucket.
    - label: List objects transitioned to cold tier
      command: mc ls cold/tiered
      context: Shows objects that have already transitioned from the hot NVMe cluster.
    - label: View storage distribution
      command: mc du hot/ && mc du cold/
      context: Side-by-side storage usage showing data moving from hot to cold over
        time.
    - label: Add tiering target manually
      command: mc admin tier add minio hot COLD-TIER --endpoint http://cold-cluster-lb:80
        --access-key minioadmin --secret-key minioadmin --bucket tiered
      context: Example command for registering the cold cluster as a tiering target
        — already configured automatically on deploy.
  fa_ready: true
  updated_at: '2026-04-01'
