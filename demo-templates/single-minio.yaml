# Template metadata
_template:
  name: "Single MinIO"
  category: "general"
  tags: ["single-node", "quickstart", "s3-compatible", "basic"]
  description: "A single MinIO node providing S3-compatible object storage. The simplest possible MinIO deployment for quick demos, development, and proof-of-concept work."
  objective: "Provide a minimal, fast-starting MinIO instance for exploring the S3 API, MinIO console, and basic storage operations"
  minio_value: "MinIO delivers full S3 API compatibility in a single binary — spin up in seconds, use any S3 client, and scale to a cluster later without changing your application"
  estimated_resources:
    memory: "512MB"
    cpu: 1
    containers: 1
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start the single MinIO node"
    - step: "Open MinIO console"
      description: "Navigate to the MinIO web console (port 9001) and log in with the admin credentials"
    - step: "Create a bucket"
      description: "Create a new bucket from the console UI"
    - step: "Upload objects"
      description: "Upload files via the console or connect any S3-compatible client to port 9000"
    - step: "Explore the console"
      description: "Browse access keys, bucket policies, lifecycle rules, and event notifications available even on a single node"

# Standard demo definition
id: single-minio
name: "Single MinIO"
description: "A single MinIO node for basic storage testing"

networks:
  - name: default
    subnet: "172.28.0.0/24"
    dns_suffix: "default.demo.local"

nodes:
  - id: minio-1
    component: minio
    variant: single
    position: {x: 300, y: 200}
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    networks:
      default: {aliases: ["minio"]}

edges: []
