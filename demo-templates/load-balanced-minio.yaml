# Template metadata
_template:
  name: "Load-Balanced MinIO"
  category: "infrastructure"
  tags: ["load-balancer", "nginx", "high-availability", "scalability"]
  description: "NGINX load balancer distributing S3 API traffic across two MinIO nodes for horizontal scalability and availability."
  objective: "Demonstrate how NGINX fronts multiple MinIO instances to provide a single S3 endpoint with traffic distribution"
  minio_value: "MinIO's S3-compatible API works seamlessly behind standard load balancers, enabling horizontal scaling without client-side changes"
  estimated_resources:
    memory: "2GB"
    cpu: 2
    containers: 3
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start the NGINX load balancer and both MinIO nodes"
    - step: "Connect via load balancer endpoint"
      description: "Use the NGINX endpoint (port 9000) as your single S3 URL — clients never address nodes directly"
    - step: "Upload objects"
      description: "Upload files through the load balancer and note which backend node receives each request"
    - step: "Verify distribution"
      description: "Open both MinIO consoles and confirm objects are spread across both nodes"
    - step: "Simulate a node failure"
      description: "Stop one MinIO node and verify the load balancer automatically routes all traffic to the healthy node"

# Standard demo definition
id: load-balanced-minio
name: "Load-Balanced MinIO"
description: "NGINX load balancer distributing traffic across two MinIO nodes"

networks:
  - name: frontend
    subnet: "172.31.0.0/24"
    dns_suffix: "frontend.demo.local"
  - name: backend
    subnet: "172.31.1.0/24"
    dns_suffix: "backend.demo.local"

nodes:
  - id: nginx-lb
    component: nginx
    variant: load-balancer
    position: {x: 100, y: 200}
    config: {}
    networks:
      frontend: {aliases: ["lb"]}

  - id: minio-1
    component: minio
    variant: single
    position: {x: 350, y: 100}
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    networks:
      frontend: {aliases: ["minio-1"]}
      backend: {aliases: ["minio-1"]}

  - id: minio-2
    component: minio
    variant: single
    position: {x: 350, y: 300}
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    networks:
      frontend: {aliases: ["minio-2"]}
      backend: {aliases: ["minio-2"]}

edges:
  - id: e-lb-minio1
    source: nginx-lb
    target: minio-1
    connection_type: load-balance
    network: frontend
    label: "LB -> MinIO-1"

  - id: e-lb-minio2
    source: nginx-lb
    target: minio-2
    connection_type: load-balance
    network: frontend
    label: "LB -> MinIO-2"
