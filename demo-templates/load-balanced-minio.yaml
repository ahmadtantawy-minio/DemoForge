id: load-balanced-minio
name: "Load-Balanced MinIO"
description: "NGINX load balancer distributing traffic across two MinIO nodes"

networks:
  - name: frontend
    subnet: "172.31.0.0/24"
    dns_suffix: "frontend.demo.local"
  - name: backend
    subnet: "172.31.1.0/24"
    dns_suffix: "backend.demo.local"

nodes:
  - id: nginx-lb
    component: nginx
    variant: load-balancer
    position: {x: 100, y: 200}
    config: {}
    networks:
      frontend: {aliases: ["lb"]}

  - id: minio-1
    component: minio
    variant: single
    position: {x: 350, y: 100}
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    networks:
      frontend: {aliases: ["minio-1"]}
      backend: {aliases: ["minio-1"]}

  - id: minio-2
    component: minio
    variant: single
    position: {x: 350, y: 300}
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    networks:
      frontend: {aliases: ["minio-2"]}
      backend: {aliases: ["minio-2"]}

edges:
  - id: e-lb-minio1
    source: nginx-lb
    target: minio-1
    connection_type: load-balance
    network: frontend
    label: "LB -> MinIO-1"

  - id: e-lb-minio2
    source: nginx-lb
    target: minio-2
    connection_type: load-balance
    network: frontend
    label: "LB -> MinIO-2"
