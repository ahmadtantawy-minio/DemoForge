# Template metadata
_template:
  name: "Multi-Node MinIO Cluster"
  category: "infrastructure"
  tags: ["cluster", "multi-node", "load-balancer", "monitoring", "erasure-coding", "scalability"]
  description: "4 MinIO nodes behind an NGINX load balancer with Prometheus monitoring. A foundational distributed cluster layout showing horizontal scaling and node-level observability."
  objective: "Demonstrate a multi-node MinIO deployment fronted by a load balancer, with per-node metrics flowing into Prometheus"
  minio_value: "MinIO scales horizontally across commodity nodes — adding nodes increases both capacity and throughput linearly without downtime"
  estimated_resources:
    memory: "3GB"
    cpu: 4
    containers: 6
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start the 4 MinIO nodes, NGINX load balancer, and Prometheus"
    - step: "Connect via load balancer"
      description: "Use the NGINX endpoint as the single S3 entry point; the load balancer distributes requests round-robin"
    - step: "Upload a batch of objects"
      description: "Upload files through the load balancer to distribute data across all 4 nodes"
    - step: "Query Prometheus"
      description: "Open Prometheus (port 9090) and explore per-node metrics such as request rate and disk usage"
    - step: "Stop a node and observe"
      description: "Stop one of the MinIO nodes and verify the remaining 3 nodes continue serving requests"

# Standard demo definition
name: "Multi-Node MinIO Cluster"
description: "4 MinIO nodes behind NGINX load balancer with Prometheus monitoring"

networks:
  - name: default

nodes:
  - id: nginx-lb
    component: nginx
    variant: single
    position: { x: 100, y: 250 }
  - id: minio-1
    component: minio
    variant: single
    position: { x: 400, y: 100 }
  - id: minio-2
    component: minio
    variant: single
    position: { x: 400, y: 250 }
  - id: minio-3
    component: minio
    variant: single
    position: { x: 400, y: 400 }
  - id: minio-4
    component: minio
    variant: single
    position: { x: 400, y: 550 }
  - id: prometheus
    component: prometheus
    variant: single
    position: { x: 700, y: 250 }

edges:
  - id: e-lb-1
    source: nginx-lb
    target: minio-1
    connection_type: load-balance
    connection_config:
      algorithm: round-robin
      backend_port: "9000"
  - id: e-lb-2
    source: nginx-lb
    target: minio-2
    connection_type: load-balance
    connection_config:
      algorithm: round-robin
      backend_port: "9000"
  - id: e-lb-3
    source: nginx-lb
    target: minio-3
    connection_type: load-balance
    connection_config:
      algorithm: round-robin
      backend_port: "9000"
  - id: e-lb-4
    source: nginx-lb
    target: minio-4
    connection_type: load-balance
    connection_config:
      algorithm: round-robin
      backend_port: "9000"
  - id: e-metrics-1
    source: minio-1
    target: prometheus
    connection_type: metrics
  - id: e-metrics-2
    source: minio-2
    target: prometheus
    connection_type: metrics
  - id: e-metrics-3
    source: minio-3
    target: prometheus
    connection_type: metrics
  - id: e-metrics-4
    source: minio-4
    target: prometheus
    connection_type: metrics
