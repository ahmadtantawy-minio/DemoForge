_template:
  name: Sovereign Cyber Data Lake
  tier: advanced
  category: cybersecurity
  tags:
  - cybersecurity
  - soc
  - analytics
  - aistor-tables
  - metabase
  - trino
  - iceberg
  description: 'SOC analytics platform: 3 source systems → AIStor Tables → Trino SQL
    → Metabase dashboards. Firewall logs, threat intelligence feeds, and vulnerability
    scans correlated in a sovereign data lake. Includes pre-built dashboards and 10
    demo queries.'
  objective: Demonstrate a sovereign cyber data lake using MinIO AIStor as the single
    storage platform — structured Iceberg tables and unstructured objects (STIX feeds,
    malware samples) in one system, queryable with standard SQL via Trino, visualised
    in Metabase.
  minio_value: MinIO AIStor stores both structured Iceberg tables (firewall events,
    threat IOCs, vuln scan data) and unstructured objects (STIX bundles, malware binaries)
    in the same system with the same access policies and audit trail. No SIEM. No
    proprietary format. Open standards.
  estimated_resources:
    memory: 8GB
    cpu: 6
    containers: 6
  external_dependencies:
  - MinIO AIStor Enterprise license (RELEASE.2026-02-02 or later)
  walkthrough:
  - step: Review the canvas topology
    description: Three External System source nodes feed into a single AIStor data
      lake. Trino and Metabase sit downstream for analytics — no SIEM required.
  - step: Deploy the demo
    description: Click Deploy. All 6 containers start. Watch the Perimeter Firewall
      log viewer — 500K firewall events being ingested in real time.
  - step: Open MinIO Console
    description: Navigate to the analytics-warehouse bucket. See structured Iceberg
      metadata alongside raw threat-intel STIX bundles and malware-vault binaries.
  - step: Open Metabase dashboards
    description: 'Three dashboards are auto-provisioned: SOC Overview, Threat Intelligence,
      and Vulnerability Posture. Login with admin@demoforge.local / DemoForge123!'
  - step: Run demo queries
    description: Navigate to CPX Demo Queries in Metabase. Run Query 3 (IOC correlation),
      Query 6 (priority list), Query 8 (unstructured → queryable), and Query 10 (live
      streaming).
  se_guide:
    overview: Sovereign Cyber Data Lake — SOC Analytics Platform
    talking_points:
    - Three source systems push data into a single sovereign data lake
    - MinIO AIStor — built-in Iceberg V3 catalog, no metastore needed
    - Structured Iceberg tables + raw objects (STIX feeds, malware samples) in the
      same system
    - Trino queries all data with standard SQL — no proprietary query language
    - Metabase auto-provisioned — 3 dashboards + 10 demo queries ready to click
    - Fraction of the cost of a SIEM — sovereign, open standards
    demo_flow:
    - step: 1
      action: Show canvas topology before deploy
      say: Three source systems — one sovereign data platform
    - step: 2
      action: Click Deploy, open log viewer on Perimeter Firewall
      say: Watch data flow — 500K firewall events being ingested
    - step: 3
      action: Open MinIO Console → analytics-warehouse bucket
      say: Structured Iceberg tables AND raw objects — same system, same security
        model
    - step: 4
      action: Navigate to threat-intel/feeds/stix/ → click a JSON file
      say: STIX 2.1 bundles — semi-structured threat feeds alongside tables
    - step: 5
      action: Open Metabase → SOC Overview dashboard
      say: Auto-provisioned. Real-time. No manual setup.
    - step: 6
      action: Open Threat Intelligence dashboard
      say: IOCs correlated across feeds — which actors, which confidence levels
    - step: 7
      action: Open Vulnerability Posture dashboard
      say: Your CISO's board report — where to patch first
    - step: 8
      action: Navigate to CPX Demo Queries → click Query 3
      say: Firewall logs joined with threat intel. Try this in Splunk.
    - step: 9
      action: Click Query 6
      say: The money query — unpatched AND suspicious traffic, the priority list
    - step: 10
      action: Click Query 8
      say: Malware binaries → queryable metadata. Unstructured becomes structured.
    - step: 11
      action: Click Query 10, wait 30s, run again
      say: Count increases. Streaming is live. Right now.
    - step: 12
      action: Return to MinIO Console — AIStor Tables differentiator
      say: Built-in Iceberg V3 catalog. No metastore. Sovereign. Open.
    - step: 13
      action: Close
      say: One platform. Tables + objects. SQL + dashboards. Sovereign. Open.
  fa_ready: true
  updated_at: '2026-04-15'
id: template-sovereign-cyber-data-lake
name: Sovereign Cyber Data Lake
description: SOC analytics platform with 3 source systems feeding AIStor Tables via
  Iceberg, queried with Trino, visualized in Metabase. Includes pre-built dashboards
  and 10 demo queries.
