sticky_notes:
# --- Customer-facing notes ---
- id: sn-fw-data
  position: {x: -560, y: 30}
  width: 280
  height: 90
  title: Firewall event stream
  text: "500K events as Iceberg tables (Parquet). 20 columns: IPs, ports, protocol,
    action, severity, MITRE ATT\u0026CK tactic. Streaming at 25 events/sec after initial
    seed."
  color: '#6b7280'
  visibility: customer
- id: sn-ti-data
  position: {x: -560, y: 240}
  width: 280
  height: 110
  title: Three data types, two write paths
  text: "Structured: 8K IOC records as Iceberg table via catalog API. Semi-structured:
    500 STIX 2.1 JSON bundles as S3 objects. Unstructured: 200 malware binary samples
    as S3 objects with metadata mirrored to queryable Iceberg table."
  color: '#6b7280'
  visibility: customer
- id: sn-vs-data
  position: {x: -560, y: 440}
  width: 280
  height: 80
  title: Vulnerability scan data
  text: "15K scan findings as Iceberg table. CVE IDs, CVSS scores, remediation status,
    business unit, OS. Batch import \u2014 scans are periodic."
  color: '#6b7280'
  visibility: customer
- id: sn-aistor-catalog
  position: {x: 150, y: 100}
  width: 360
  height: 100
  title: Built-in Iceberg V3 REST catalog
  text: "No external metastore. No Polaris. No Hive. The catalog is embedded at /_iceberg
    on port 9000. Warehouse \u2192 Namespace \u2192 Table hierarchy. Structured Iceberg
    tables AND raw S3 objects coexist \u2014 same cluster, same encryption, same IAM."
  color: '#0d9488'
  visibility: customer
- id: sn-trino-config
  position: {x: 789, y: 190}
  width: 250
  height: 70
  title: Standard SQL over Iceberg
  text: "Trino connects to AIStor\u2019s Iceberg REST catalog. Any SQL query runs against
    all 4 tables. No proprietary query language \u2014 standard ANSI SQL."
  color: '#3b82f6'
  visibility: customer
- id: sn-metabase-info
  position: {x: 1079, y: 50}
  width: 250
  height: 80
  title: Auto-provisioned dashboards
  text: "3 dashboards created automatically: SOC Overview, Threat Intelligence, Vulnerability
    Posture. Plus 10 pre-configured analyst queries."
  color: '#a855f7'
  visibility: customer
- id: sn-sovereignty
  position: {x: 150, y: 580}
  width: 360
  height: 80
  title: Full data sovereignty
  text: "Everything runs on-prem. No cloud dependency. UAE PDPL compliant. Data never
    leaves your infrastructure. Open standards \u2014 Iceberg + S3 API. Swap any component
    without vendor lock-in."
  color: '#0d9488'
  visibility: customer
# --- FA internal notes ---
- id: sn-fw-fa
  position: {x: -560, y: 130}
  width: 280
  height: 100
  title: Demo tip
  text: "Seeding takes ~30s. Show DemoForge log viewer during seeding \u2014 audience
    sees progress bar. After seed, open MinIO Console to show Parquet files landing.
    3% of dst_ips correlate with IOCs \u2014 the join query WILL have results."
  visibility: internal
- id: sn-ti-fa
  position: {x: -560, y: 360}
  width: 280
  height: 110
  title: Key demo moment
  text: "Open MinIO Console \u2192 navigate to threat-intel/feeds/stix/ and click a
    JSON file. Show it\u2019s a real STIX bundle. Then navigate to malware-vault/samples/
    \u2014 show binary objects exist. Then run Query 8 in Metabase to show malware_metadata
    table. This IS the structured+unstructured unified story."
  visibility: internal
- id: sn-vs-fa
  position: {x: -560, y: 530}
  width: 280
  height: 80
  title: "Query 6 setup"
  text: "80% of firewall src_ips match vuln scan host_ips \u2014 so the cross-join
    in Query 6 (exposed hosts) will return a meaningful prioritized remediation list.
    This is usually the \u2018wow\u2019 moment for CISOs."
  visibility: internal
- id: sn-aistor-fa
  position: {x: 150, y: 490}
  width: 360
  height: 120
  title: Differentiator script
  text: "Say: \u2018Every other Iceberg deployment requires a separate catalog service
    \u2014 Hive metastore, Nessie, Polaris. That\u2019s another component to deploy,
    secure, back up, and monitor. AIStor builds the catalog directly into the storage
    layer. One system. One security model.\u2019 Then open MinIO Console and show the
    tables AND the raw object buckets side by side."
  visibility: internal
- id: sn-cost-fa
  position: {x: 789, y: 490}
  width: 250
  height: 100
  title: "Total cost of ownership"
  text: "Proprietary SIEM platforms charge $150-200/GB ingested. At 1TB/day that exceeds
    $55M/year. AIStor + Trino + Metabase: pay only for storage, not per byte ingested.
    Open-source query and visualisation layer — no license lock-in."
  visibility: customer
- id: sn-queries-fa
  position: {x: 789, y: 390}
  width: 250
  height: 200
  title: Query presentation order
  text: "Open Metabase \u2192 CPX Demo Queries collection. Run in order:\nQ1: Event
    count (confirms scale)\nQ2: Show all tables (catalog works)\nQ3: IOC correlation
    join (the wow query \u2014 pause here, explain)\nQ4: Threat actor summary (who\u2019s
    attacking)\nQ6: Exposed hosts (CISO moment \u2014 unpatched + suspicious)\nQ8:
    Malware metadata (unstructured \u2192 queryable)\nQ10: Run twice, 30s apart (streaming
    proof)\nSkip Q5, Q7, Q9 if short on time."
  visibility: internal
- id: sn-metabase-fa
  position: {x: 1079, y: 320}
  width: 280
  height: 140
  title: Dashboard flow
  text: "Start with SOC Overview (big picture, time series). Move to Threat Intel
    (actor-specific). Then Vuln Posture (remediation angle). THEN switch to Demo Queries
    collection for the interactive portion.\n\nIf dashboards are slow to load, Metabase
    is still syncing schema. Wait 15s and refresh."
  visibility: internal
- id: sn-opening-fa
  position: {x: -650, y: -100}
  width: 300
  height: 120
  title: "Opening (before deploy)"
  text: "Show canvas first \u2014 narrate the topology. \u2018Three source systems
    on the left \u2014 your firewalls, threat intel, vuln scanners. MinIO AIStor in
    the center \u2014 one system for tables AND objects. Trino for SQL. Metabase for
    dashboards. Everything on-prem, everything sovereign.\u2019 THEN click Deploy."
  visibility: internal
- id: sn-closing-fa
  position: {x: -650, y: 650}
  width: 300
  height: 120
  title: "Closing (after queries)"
  text: "Recap: \u2018One platform. Structured tables + raw objects. Standard SQL +
    auto-provisioned dashboards. Sovereign. On-prem. A fraction of Splunk\u2019s cost.
    And the same data can power ML anomaly detection and AI threat hunting tomorrow
    \u2014 no ETL, no copying. That\u2019s AIStor Tables.\u2019\n\nThen offer: \u2018Want
    to see the AI extension? We have notebooks ready.\u2019"
  visibility: internal
