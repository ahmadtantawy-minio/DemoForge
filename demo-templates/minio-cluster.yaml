# Template metadata
_template:
  name: "MinIO Cluster (4-Node)"
  category: "infrastructure"
  tags: ["cluster", "erasure-coding", "load-balancer", "monitoring", "resilience", "4-node"]
  description: "4-node erasure-coded MinIO cluster behind an NGINX load balancer with Prometheus and Grafana monitoring. Demonstrates cluster resilience — stop any node and the cluster continues serving data."
  objective: "Show how a 4-node MinIO cluster with erasure coding tolerates node failures while maintaining full read/write availability"
  minio_value: "MinIO's erasure coding across 4 nodes tolerates up to 2 simultaneous node failures with zero data loss and no performance degradation"
  estimated_resources:
    memory: "4GB"
    cpu: 4
    containers: 7
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start the 4-node MinIO cluster, NGINX load balancer, Prometheus, and Grafana"
    - step: "Upload data via load balancer"
      description: "Connect to the NGINX endpoint and upload test objects to the cluster"
    - step: "Open Grafana dashboards"
      description: "Review cluster health, node status, and throughput metrics in real time"
    - step: "Stop a node"
      description: "Right-click a cluster node and select Stop to simulate a node failure"
    - step: "Verify continued availability"
      description: "Confirm that reads and writes continue through the load balancer with the remaining 3 nodes"
    - step: "Stop a second node"
      description: "Stop another node to demonstrate that the cluster tolerates 2 simultaneous failures"
    - step: "Restart nodes and observe healing"
      description: "Restart stopped nodes and watch them rejoin the cluster and heal via erasure reconstruction"

# Standard demo definition
name: "MinIO Cluster (4-Node)"
description: "4-node erasure-coded MinIO cluster behind NGINX load balancer with Prometheus monitoring. Demonstrates cluster resilience — stop any node and the cluster continues serving data."

networks:
  - name: default

nodes:
  - id: nginx-lb
    component: nginx
    variant: single
    position: { x: 50, y: 200 }
    display_name: "Load Balancer"
  - id: prometheus
    component: prometheus
    variant: single
    position: { x: 800, y: 150 }
  - id: grafana
    component: grafana
    variant: single
    position: { x: 1000, y: 150 }

clusters:
  - id: minio-cluster-1
    component: minio
    label: "MinIO Cluster"
    position: { x: 300, y: 100 }
    node_count: 4
    drives_per_node: 1
    credentials:
      root_user: minioadmin
      root_password: minioadmin

edges:
  - id: e-lb
    source: nginx-lb
    target: minio-cluster-1
    connection_type: load-balance
    connection_config: { algorithm: least-conn, backend_port: "9000" }
  - id: e-metrics
    source: minio-cluster-1
    target: prometheus
    connection_type: metrics
  - id: e-grafana
    source: prometheus
    target: grafana
    connection_type: metrics-query
