name: "MinIO Cluster (4-Node)"
description: "4-node erasure-coded MinIO cluster behind NGINX load balancer with Prometheus monitoring. Demonstrates cluster resilience — stop any node and the cluster continues serving data."

networks:
  - name: default

nodes:
  - id: nginx-lb
    component: nginx
    variant: single
    position: { x: 50, y: 200 }
    display_name: "Load Balancer"
  - id: prometheus
    component: prometheus
    variant: single
    position: { x: 800, y: 150 }
  - id: grafana
    component: grafana
    variant: single
    position: { x: 1000, y: 150 }

clusters:
  - id: minio-cluster-1
    component: minio
    label: "MinIO Cluster"
    position: { x: 300, y: 100 }
    node_count: 4
    drives_per_node: 1
    credentials:
      root_user: minioadmin
      root_password: minioadmin

edges:
  - id: e-lb
    source: nginx-lb
    target: minio-cluster-1
    connection_type: load-balance
    connection_config: { algorithm: least-conn, backend_port: "9000" }
  - id: e-metrics
    source: minio-cluster-1
    target: prometheus
    connection_type: metrics
  - id: e-grafana
    source: prometheus
    target: grafana
    connection_type: metrics-query
