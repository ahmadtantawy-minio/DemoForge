id: bucket-replication
name: "Bucket Replication"
description: "Two MinIO nodes with bucket-level replication from source to target"

networks:
  - name: default
    subnet: "172.32.0.0/24"
    dns_suffix: "default.demo.local"

nodes:
  - id: minio-source
    component: minio
    variant: replication-source
    position: {x: 200, y: 200}
    config:
      MINIO_ROOT_USER: "sourceadmin"
      MINIO_ROOT_PASSWORD: "sourcepassword"
    networks:
      default: {aliases: ["minio-source"]}

  - id: minio-target
    component: minio
    variant: replication-target
    position: {x: 500, y: 200}
    config:
      MINIO_ROOT_USER: "targetadmin"
      MINIO_ROOT_PASSWORD: "targetpassword"
    networks:
      default: {aliases: ["minio-target"]}

edges:
  - id: e-repl-source-target
    source: minio-source
    target: minio-target
    connection_type: replication
    network: default
    label: "Bucket Replication"
    connection_config:
      source_bucket: "source-bucket"
      target_bucket: "replica-bucket"
      replication_mode: "async"
