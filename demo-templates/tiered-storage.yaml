id: tiered-storage
name: "Tiered Storage"
description: "Hot MinIO tier automatically transitions objects to cold MinIO tier via ILM policies"

networks:
  - name: default
    subnet: "172.33.0.0/24"
    dns_suffix: "default.demo.local"

nodes:
  - id: minio-hot
    component: minio
    variant: single
    position: {x: 200, y: 200}
    config:
      MINIO_ROOT_USER: "hotadmin"
      MINIO_ROOT_PASSWORD: "hotpassword"
    networks:
      default: {aliases: ["minio-hot"]}

  - id: minio-cold
    component: minio
    variant: single
    position: {x: 500, y: 200}
    config:
      MINIO_ROOT_USER: "coldadmin"
      MINIO_ROOT_PASSWORD: "coldpassword"
    networks:
      default: {aliases: ["minio-cold"]}

edges:
  - id: e-tiering-hot-cold
    source: minio-hot
    target: minio-cold
    connection_type: tiering
    network: default
    label: "Hot -> Cold"
    connection_config:
      policy_name: "transition-after-30d"
      transition_days: "30"
      storage_class: "STANDARD"
