# Template metadata
_template:
  name: "Tiered Storage"
  category: "infrastructure"
  tags: ["tiering", "ilm", "hot-cold", "lifecycle", "cost-optimization"]
  description: "Two MinIO nodes representing hot and cold storage tiers. Objects on the hot tier automatically transition to the cold tier after 30 days via an ILM policy."
  objective: "Demonstrate MinIO's ILM tiering capability with a simple hot-to-cold object transition using a lifecycle policy"
  minio_value: "MinIO's ILM tiering lets you keep recent data on fast, expensive storage and automatically move older data to lower-cost storage — all through the standard S3 API with no application changes"
  estimated_resources:
    memory: "1GB"
    cpu: 1
    containers: 2
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start the hot and cold MinIO nodes"
    - step: "Inspect the ILM policy"
      description: "Open the hot MinIO console and review the transition-after-30d lifecycle rule configured on the ingest bucket"
    - step: "Upload objects to hot tier"
      description: "Upload test objects to the hot tier and verify they are accessible at full speed"
    - step: "Trigger a manual transition"
      description: "Use the MinIO mc CLI to manually trigger a tier transition and observe objects moving to the cold node"
    - step: "Verify cold tier objects"
      description: "Open the cold MinIO console and confirm that transitioned objects are present and readable"
    - step: "Confirm transparent access"
      description: "Read a transitioned object via the hot tier endpoint to demonstrate seamless tiered access"

# Standard demo definition
id: tiered-storage
name: "Tiered Storage"
description: "Hot MinIO tier automatically transitions objects to cold MinIO tier via ILM policies"

networks:
  - name: default
    subnet: "172.33.0.0/24"
    dns_suffix: "default.demo.local"

nodes:
  - id: minio-hot
    component: minio
    variant: single
    position: {x: 200, y: 200}
    config:
      MINIO_ROOT_USER: "hotadmin"
      MINIO_ROOT_PASSWORD: "hotpassword"
    networks:
      default: {aliases: ["minio-hot"]}

  - id: minio-cold
    component: minio
    variant: single
    position: {x: 500, y: 200}
    config:
      MINIO_ROOT_USER: "coldadmin"
      MINIO_ROOT_PASSWORD: "coldpassword"
    networks:
      default: {aliases: ["minio-cold"]}

edges:
  - id: e-tiering-hot-cold
    source: minio-hot
    target: minio-cold
    connection_type: tiering
    network: default
    label: "Hot -> Cold"
    connection_config:
      policy_name: "transition-after-30d"
      transition_days: "30"
      storage_class: "STANDARD"
