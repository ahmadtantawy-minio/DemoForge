# Template metadata
_template:
  name: "Versioned data lake (Nessie)"
  tier: advanced
  category: lakehouse
  tags: ["nessie", "dremio", "iceberg", "versioning", "data-lake", "git-like", "branching"]
  description: "Git-like data versioning: Data Generator writes to MinIO, Dremio uses Project Nessie as the versioned Iceberg catalog, enabling branches, tags, and time-travel queries — visualized in Metabase."
  objective: "Demonstrate MinIO + Nessie as a versioned data lake where every table mutation is tracked like a git commit — enabling safe schema evolution, rollback, and multi-branch experimentation"
  minio_value: "MinIO stores all Iceberg data files while Nessie tracks every commit, branch, and tag against those files — giving teams git-like data governance on top of standard S3-compatible storage"
  estimated_resources:
    memory: "5GB"
    cpu: 5
    containers: 5
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start all components. Wait for all health indicators to turn green (~90s for Dremio)."
    - step: "Generate sample data"
      description: "Right-click Data Generator → Start Generating to push structured data files into MinIO."
    - step: "Browse MinIO storage"
      description: "Open MinIO Console to see raw data files accumulating in the default bucket."
    - step: "Create a branch in Nessie"
      description: "Open Nessie UI or use Dremio SQL: CREATE BRANCH dev IN nessie; — this creates a new experiment branch without touching main."
    - step: "Query with Dremio"
      description: "Open Dremio UI → connect to Nessie catalog → SELECT * FROM nessie.main.events LIMIT 100; to query the main branch."
    - step: "Experiment on dev branch"
      description: "In Dremio: USE REFERENCE dev IN nessie; INSERT INTO nessie.dev.events ... — changes are isolated to the dev branch, main is unaffected."
    - step: "Merge and visualize"
      description: "Open Metabase → connect to Dremio → build dashboards on the merged production data."

# Standard demo definition
id: template-versioned-data-lake
name: "Versioned Data Lake"
description: "Git-like data versioning: Data Generator → MinIO → Nessie versioned catalog → Dremio → Metabase"

networks:
  - name: default
    subnet: 172.20.0.0/16
    driver: bridge

nodes:
  # Data producer
  - id: data-gen
    component: data-generator
    variant: default
    position: { x: -200, y: 150 }
    display_name: "Data Generator"
    config: {}

  # Core storage
  - id: minio-1
    component: minio
    variant: single
    position: { x: 100, y: 150 }
    display_name: "MinIO"
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"

  # Versioned catalog
  - id: nessie-1
    component: nessie
    variant: default
    position: { x: 400, y: 50 }
    display_name: "Project Nessie"
    config: {}

  # SQL query engine with Nessie integration
  - id: dremio-1
    component: dremio
    variant: default
    position: { x: 700, y: 150 }
    display_name: "Dremio"
    config: {}

  # BI visualization
  - id: metabase-1
    component: metabase
    variant: default
    position: { x: 1000, y: 150 }
    display_name: "Metabase"
    config: {}

clusters: []

edges:
  # Data Generator → MinIO (structured data)
  - id: e-datagen-minio
    source: data-gen
    target: minio-1
    connection_type: structured-data
    network: default
    auto_configure: true
    label: "Structured data"
    connection_config:
      bucket: "raw-data"

  # Dremio → MinIO (S3 access)
  - id: e-dremio-minio
    source: dremio-1
    target: minio-1
    connection_type: s3
    network: default
    auto_configure: true
    label: "S3"
    connection_config:
      bucket: "raw-data"

  # Dremio → Nessie (versioned Iceberg catalog)
  - id: e-dremio-nessie
    source: dremio-1
    target: nessie-1
    connection_type: iceberg-catalog
    network: default
    auto_configure: true
    label: "Nessie catalog"
    connection_config:
      catalog_name: "nessie"

  # Metabase → Dremio (SQL)
  - id: e-metabase-dremio
    source: metabase-1
    target: dremio-1
    connection_type: dremio-sql
    network: default
    auto_configure: true
    label: "Dremio SQL"

groups: []
sticky_notes: []

resources:
  default_memory: 512m
  default_cpu: 0.5
  max_memory: 2g
  max_cpu: 2.0
  total_memory: 5g
  total_cpu: 5.0
