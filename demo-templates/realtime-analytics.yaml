# Template metadata
_template:
  name: "Real-Time Analytics with ClickHouse"
  category: "analytics"
  tags: ["real-time", "clickhouse", "olap", "s3-query", "dashboards"]
  description: "ClickHouse reads data directly from MinIO via S3 table functions for real-time analytics. Includes Grafana dashboards for monitoring both MinIO and ClickHouse."
  objective: "Demonstrate MinIO as the data layer for real-time OLAP queries — no ETL, no data movement, just query in place"
  minio_value: "MinIO serves as the unified data lake that ClickHouse queries directly via S3 table functions — zero ETL, zero data duplication"
  estimated_resources:
    memory: "3GB"
    cpu: 3
    containers: 5
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start MinIO, ClickHouse, Prometheus, and Grafana. Wait for green health indicators."
    - step: "Generate data"
      description: "Right-click Data Generator → Start Generating to push CSV files to MinIO's demo-bucket."
    - step: "Query with ClickHouse"
      description: "Open ClickHouse Play UI and run: SELECT count() FROM s3('http://minio:9000/demo-bucket/*.csv', 'minioadmin', 'minioadmin', 'CSVWithNames')"
    - step: "Run aggregations"
      description: "Try: SELECT category, count(), avg(value) FROM s3('http://minio:9000/demo-bucket/*.csv', 'minioadmin', 'minioadmin', 'CSVWithNames') GROUP BY category"
    - step: "Monitor in Grafana"
      description: "Open Grafana → MinIO Dashboard to see S3 API calls, throughput, and bucket stats in real-time."
    - step: "Watch real-time"
      description: "Enable Cockpit to see object counts increase as data flows from generator to MinIO."

# Standard demo definition
id: template-realtime-analytics
name: "Real-Time Analytics with ClickHouse"
description: "ClickHouse reads data directly from MinIO via S3 table functions for real-time analytics dashboards"

networks:
  - name: default
    subnet: 172.20.0.0/16
    driver: bridge

nodes:
  - id: file-gen
    component: file-generator
    variant: burst
    position: { x: 50, y: 150 }
    display_name: "Data Generator"
    config: {}

  - id: minio
    component: minio
    variant: single
    position: { x: 300, y: 150 }
    display_name: "MinIO"
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"

  - id: clickhouse
    component: clickhouse
    variant: default
    position: { x: 550, y: 150 }
    display_name: "ClickHouse"
    config: {}

  - id: prometheus
    component: prometheus
    variant: default
    position: { x: 300, y: 350 }
    display_name: "Prometheus"
    config: {}

  - id: grafana
    component: grafana
    variant: default
    position: { x: 550, y: 350 }
    display_name: "Grafana"
    config: {}

clusters: []

edges:
  - id: e-filegen-minio
    source: file-gen
    target: minio
    connection_type: file-push
    network: default
    auto_configure: true
    label: ""

  - id: e-minio-clickhouse
    source: minio
    target: clickhouse
    connection_type: s3
    network: default
    auto_configure: true
    label: "S3 query"

  - id: e-minio-metrics
    source: minio
    target: prometheus
    connection_type: metrics
    network: default
    auto_configure: true
    source_handle: data-out
    label: "Metrics"

  - id: e-prom-grafana
    source: prometheus
    target: grafana
    connection_type: metrics-query
    network: default
    auto_configure: true
    label: "PromQL"

groups: []
sticky_notes: []

resources:
  default_memory: 512m
  default_cpu: 0.5
  max_memory: 2g
  max_cpu: 2.0
  total_memory: 4g
  total_cpu: 4.0
