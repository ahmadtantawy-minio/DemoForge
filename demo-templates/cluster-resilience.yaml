# Template metadata
_template:
  name: "MinIO Cluster Resilience"
  category: "infrastructure"
  tags: ["resilience", "erasure-coding", "monitoring"]
  description: "2-node MinIO cluster with file generator, Prometheus, and Grafana. Demonstrates node failure tolerance with real-time monitoring."
  objective: "Show MinIO's self-healing capabilities when nodes fail"
  minio_value: "Erasure coding ensures data availability even when nodes go down"
  estimated_resources:
    memory: "4GB"
    cpu: 4
    containers: 8
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start all components including the MinIO cluster, monitoring stack, and file generator"
    - step: "Observe baseline metrics"
      description: "Open Grafana to see cluster health metrics and file generation throughput"
    - step: "Stop a node"
      description: "Right-click a cluster node and select Stop to simulate a node failure"
    - step: "Verify data availability"
      description: "Confirm that reads and writes continue working through the remaining nodes"
    - step: "Restart the node"
      description: "Restart the stopped node and watch it rejoin the cluster and heal"

# Standard demo definition
id: template-cluster-resilience
name: "MinIO Cluster Resilience"
description: "2-node MinIO cluster with file generator, Prometheus, and Grafana. Demonstrates node failure tolerance with real-time monitoring."

networks:
  - name: default

nodes:
  - id: file-gen
    component: file-generator
    variant: burst
    position: { x: 50, y: 100 }
    display_name: "File Generator"
  - id: prometheus
    component: prometheus
    variant: default
    position: { x: 600, y: 50 }
  - id: grafana
    component: grafana
    variant: default
    position: { x: 800, y: 50 }

clusters:
  - id: minio-cluster-1
    component: minio
    label: "MinIO Cluster"
    position: { x: 300, y: 50 }
    node_count: 2
    drives_per_node: 2
    credentials:
      root_user: minioadmin
      root_password: minioadmin

edges:
  - id: e-filegen-cluster
    source: file-gen
    target: minio-cluster-1
    connection_type: file-push
  - id: e-cluster-metrics
    source: minio-cluster-1
    target: prometheus
    connection_type: metrics
    source_handle: data-out
  - id: e-grafana
    source: prometheus
    target: grafana
    connection_type: metrics-query

groups: []
sticky_notes: []
