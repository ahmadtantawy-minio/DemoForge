_template:
  name: ML experiment tracker
  tier: essentials
  category: ai
  tags:
  - mlflow
  - jupyter
  - training
  - experiment-tracking
  - sklearn
  description: Train ML models on MinIO data, track experiments in MLflow, browse artifacts. JupyterLab for interactive exploration.
  objective: Demonstrate MinIO as the artifact store and data lake for the ML lifecycle
  minio_value: MLflow stores all model artifacts, training plots, and evaluation datasets in MinIO. JupyterLab reads training data from MinIO. The entire ML lifecycle runs on one storage platform.
  estimated_resources:
    memory: 4GB
    cpu: 3
    containers: 5
  external_dependencies: []
  walkthrough:
  - step: Deploy and generate data
    description: Click Deploy. Start the data generator with E-commerce orders scenario to populate MinIO with training data.
  - step: Prepare training data
    description: Open ML Trainer → click 'Prepare data' to split raw data into train/test sets in MinIO.
  - step: Run training experiments
    description: Click 'Run quick training' — 3 different models train on MinIO data, log to MLflow.
  - step: Compare in MLflow
    description: Open MLflow UI → compare runs → click the best model → browse artifacts (stored in MinIO).
  - step: Explore in JupyterLab
    description: Open JupyterLab → run notebook 03 → see real training with mlflow.log_model().
  - step: Check MinIO
    description: Open MinIO Console → mlflow-artifacts bucket → model files, plots, metrics all stored as objects.
  se_guide:
    pitch: Show the full ML lifecycle on MinIO — training data in, model artifacts out, all versioned and tracked in MLflow with MinIO as the artifact store. Every experiment is reproducible because everything
      lives in object storage.
    audience: ML engineers, data scientists, and platform teams evaluating unified storage for the ML lifecycle — from raw data through model deployment.
    talking_points:
    - 'MinIO is the single storage layer for the entire ML lifecycle: raw training data comes in via the data generator, processed datasets land in MinIO, and every model artifact MLflow tracks goes right
      back to MinIO.'
    - MLflow uses MinIO as its artifact store via the S3 protocol — model files, training plots, evaluation metrics, and feature importance charts are all stored as objects you can access directly.
    - JupyterLab reads training data from MinIO using the same boto3 S3 API your production code would use — the notebook is a production-realistic workflow, not a toy example.
    - 'Every experiment run is fully reproducible: the data version, the model code, the hyperparameters, and the artifacts are all stored in MinIO and tracked in MLflow. You can re-run any experiment from
      a year ago.'
    - This pattern scales naturally — swap the single MinIO node for a distributed cluster and the MLflow artifact store URL never changes. The ML stack doesn't know or care about the underlying storage
      topology.
    demo_flow:
    - step: 1
      action: Click Deploy. Start the Data Generator with the E-commerce Orders scenario.
      say: The generator is writing synthetic order data as Parquet to MinIO's raw-data bucket — this is the training dataset. MLflow and JupyterLab will both read from here.
    - step: 2
      action: Click the ML Trainer node → Prepare data.
      say: The trainer is splitting the raw data into train and test sets and writing them back to MinIO's training-data bucket. Data prep is just another S3 write.
    - step: 3
      action: Click Run quick training. Watch the three model runs appear in MLflow.
      say: Three models are training in parallel on data from MinIO — random forest, gradient boosting, and logistic regression. Each run logs metrics and artifacts to MLflow, which stores them in MinIO.
    - step: 4
      action: Open MLflow UI. Compare the three runs. Click the best model → Artifacts tab.
      say: Every artifact you see here — the model pickle, the confusion matrix plot, the feature importance chart — is an object in MinIO's mlflow-artifacts bucket. MLflow is just the index.
    - step: 5
      action: Open MinIO Console → mlflow-artifacts bucket. Navigate into one experiment's artifact path.
      say: Here's the model file, the evaluation plots, the metrics JSON — all stored as plain objects. You can download them directly, version them, or move them to a cheaper storage tier after 90 days.
    common_questions:
    - q: Why use MinIO for MLflow artifacts instead of a local filesystem?
      a: Local filesystems don't scale across multiple training nodes and aren't durable. MinIO gives you distributed, erasure-coded artifact storage accessible from any training node or serving cluster
        via the standard S3 API.
    - q: Can we use this with cloud MLflow hosted services like Databricks or SageMaker?
      a: Yes — both support S3-compatible artifact stores. Point them at your MinIO endpoint instead of AWS S3 and everything works. Your artifacts stay on-premises under your control.
    - q: How do we handle model versioning and promotion to production?
      a: MLflow's model registry handles promotion stages — Staging, Production, Archived. The artifacts for each registered version are immutable objects in MinIO. You promote a model in MLflow; the data
        in MinIO doesn't move.
    - q: What happens to storage costs as we run hundreds of experiments?
      a: 'That''s where ILM tiering pays off. You can configure a MinIO lifecycle rule: move mlflow-artifacts older than 90 days to cold storage automatically. Active models stay hot, old experiment runs
        tier down without any MLflow changes.'
    mc_commands:
    - label: List MLflow artifact bucket
      command: mc ls minio/mlflow-artifacts --recursive
      context: Shows all model files, plots, and metrics stored by MLflow — one path per experiment run.
    - label: List training data
      command: mc ls minio/training-data
      context: Shows train/test split files written by the ML Trainer — the actual data models trained on.
    - label: Download a model artifact
      command: mc cp minio/mlflow-artifacts/1/$(mc ls minio/mlflow-artifacts/1/ | head -1 | awk '{print $NF}') ./model-inspect/
      context: Downloads a model artifact locally — demonstrates direct S3 access to MLflow artifacts.
    - label: Check raw training data
      command: mc ls minio/raw-data
      context: Shows Parquet files from the data generator — the source data for all training runs.
  fa_ready: true
  updated_at: "2026-03-31"
id: template-ml-experiment-lab
name: ML Experiment Lab
description: Train models on MinIO data, track in MLflow, explore in JupyterLab
networks:
- name: default
  subnet: 172.20.0.0/16
  driver: bridge
nodes:
- id: minio-1
  component: minio
  position:
    x: 100
    y: 250
  display_name: MinIO
- id: data-gen
  component: data-generator
  variant: default
  position:
    x: -200
    y: 250
  display_name: Data Generator
- id: mlflow-1
  component: mlflow
  variant: default
  position:
    x: 400
    y: 100
  display_name: MLflow
- id: jupyter-1
  component: jupyterlab
  variant: default
  position:
    x: 400
    y: 400
  display_name: JupyterLab
- id: trainer-1
  component: ml-trainer
  variant: default
  position:
    x: 700
    y: 250
  display_name: ML Trainer
clusters: []
edges:
- id: e-datagen-minio
  source: data-gen
  target: minio-1
  connection_type: s3
  auto_configure: true
  label: Raw data
  connection_config:
    bucket: raw-data
    format: parquet
    scenario: ecommerce-orders
- id: e-mlflow-minio
  source: mlflow-1
  target: minio-1
  connection_type: s3
  auto_configure: true
  label: Model artifacts
  connection_config:
    artifact_bucket: mlflow-artifacts
- id: e-jupyter-minio
  source: jupyter-1
  target: minio-1
  connection_type: s3
  auto_configure: true
  label: Read/write data
- id: e-jupyter-mlflow
  source: jupyter-1
  target: mlflow-1
  connection_type: mlflow-tracking
  auto_configure: true
  label: Log experiments
- id: e-trainer-minio
  source: trainer-1
  target: minio-1
  connection_type: s3
  auto_configure: true
  label: Training data
  connection_config:
    training_bucket: training-data
- id: e-trainer-mlflow
  source: trainer-1
  target: mlflow-1
  connection_type: mlflow-tracking
  auto_configure: true
  label: Track experiments
groups: []
sticky_notes: []
resources:
  default_memory: 512m
  default_cpu: 0.5
  total_memory: 6g
  total_cpu: 4.0
