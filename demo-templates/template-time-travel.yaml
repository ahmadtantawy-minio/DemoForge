_template:
  name: Time travel and data auditing
  tier: essentials
  category: lakehouse
  tags:
  - time-travel
  - iceberg
  - snapshots
  - rollback
  - auditing
  description: Demonstrate Iceberg's time travel, snapshot history, and rollback capabilities on MinIO.
  objective: Show how Iceberg snapshots stored on MinIO enable querying historical data, auditing changes, and rolling back tables to any prior state
  minio_value: MinIO stores every Iceberg snapshot and data file, making time travel possible. All historical table versions live on MinIO — queryable at any point in time without duplicating data.
  estimated_resources:
    memory: 5GB
    cpu: 5
    containers: 7
  external_dependencies: []
  walkthrough:
  - step: Deploy the demo
    description: Click Deploy to start all components. Wait for health indicators to turn green (~90s for Metabase).
  - step: Generate initial data
    description: Right-click Data Generator → Start Generating to push the first batch of Parquet files into MinIO's demo-bucket.
  - step: Create an Iceberg table
    description: Open Trino terminal → CREATE SCHEMA iceberg.audit; CREATE TABLE iceberg.audit.orders AS SELECT * FROM ... — this creates snapshot v1.
  - step: Mutate the table
    description: 'Run INSERT or UPDATE statements against iceberg.audit.orders to generate new snapshots (v2, v3). Check snapshot history: SELECT * FROM iceberg.audit.orders$snapshots.'
  - step: Query a past snapshot
    description: 'Use Iceberg time travel: SELECT * FROM iceberg.audit.orders FOR VERSION AS OF <snapshot_id>; or FOR TIMESTAMP AS OF TIMESTAMP ''2024-01-01 00:00:00''.'
  - step: Roll back the table
    description: Use CALL iceberg.system.rollback_to_snapshot('audit', 'orders', <snapshot_id>) to restore the table to any prior state.
  - step: Monitor with Grafana
    description: Open Grafana to see MinIO storage growth as new snapshots accumulate, and observe that old snapshots remain accessible.
  fa_ready: true
  updated_at: "2026-03-31"
id: template-time-travel
name: Time Travel — Iceberg Snapshots
description: Query historical Iceberg table versions, audit data changes, and roll back to any snapshot — all stored on MinIO.
mode: standard
networks:
- name: default
  subnet: 172.20.0.0/16
  driver: bridge
nodes:
- id: data-gen
  component: data-generator
  variant: default
  position:
    x: -200
    y: 150
  display_name: Data Generator
  config: {}
- id: minio-1
  component: minio
  position:
    x: 100
    y: 150
  display_name: MinIO
  config:
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin
- id: iceberg-rest
  component: iceberg-rest
  variant: default
  position:
    x: 400
    y: 50
  display_name: Iceberg REST Catalog
  config: {}
- id: trino
  component: trino
  variant: default
  position:
    x: 700
    y: 50
  display_name: Trino
  config: {}
- id: metabase
  component: metabase
  variant: default
  position:
    x: 1000
    y: 150
  display_name: Metabase
  config: {}
- id: prometheus
  component: prometheus
  variant: default
  position:
    x: 400
    y: 300
  display_name: Prometheus
  config: {}
- id: grafana
  component: grafana
  variant: default
  position:
    x: 700
    y: 300
  display_name: Grafana
  config: {}
clusters: []
edges:
- id: e-datagen-minio
  source: data-gen
  target: minio-1
  connection_type: s3
  network: default
  auto_configure: true
  label: Parquet data
  connection_config:
    bucket: raw-data
- id: e-minio-iceberg
  source: minio-1
  target: iceberg-rest
  connection_type: s3
  network: default
  auto_configure: true
  label: S3 warehouse
  connection_config:
    warehouse_bucket: warehouse
- id: e-iceberg-trino
  source: iceberg-rest
  target: trino
  connection_type: iceberg-catalog
  network: default
  auto_configure: true
  label: Iceberg catalog
  connection_config:
    catalog_name: iceberg
- id: e-minio-trino
  source: minio-1
  target: trino
  connection_type: s3
  network: default
  auto_configure: true
  label: S3
  connection_config:
    catalog_name: minio
- id: e-trino-metabase
  source: trino
  target: metabase
  connection_type: sql-query
  network: default
  auto_configure: true
  label: SQL
  connection_config:
    catalog: iceberg
    schema: audit
- id: e-minio-prom
  source: minio-1
  target: prometheus
  connection_type: metrics
  network: default
  auto_configure: true
  label: Metrics
- id: e-prom-grafana
  source: prometheus
  target: grafana
  connection_type: metrics-query
  network: default
  auto_configure: true
  label: PromQL
groups: []
sticky_notes: []
resources:
  default_memory: 512m
  default_cpu: 0.5
  max_memory: 2g
  max_cpu: 2.0
  total_memory: 8g
  total_cpu: 8.0
