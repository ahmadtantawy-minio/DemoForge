_template:
  name: Three-way site replication
  tier: advanced
  category: infrastructure
  tags:
  - site-replication
  - multi-site
  - 3-way
  - bidirectional
  - n-way
  - replication
  description: Three MinIO sites with bidirectional replication. Each site has its
    own data generator pushing to a dedicated bucket. All data replicates across all
    sites automatically.
  objective: Demonstrate N-way site replication across 3 MinIO clusters with independent
    data ingestion per site
  minio_value: MinIO site replication supports N-way topologies — all sites stay in
    sync regardless of which site receives writes. This demo runs three independent
    data generators, each writing to its own site, while all data converges on every
    site through replication.
  estimated_resources:
    memory: 4GB
    cpu: 4
    containers: 14
  external_dependencies: []
  walkthrough:
  - step: Deploy the demo
    description: Click Deploy to start all three MinIO sites, data generators, and
      monitoring. Site replication activates automatically during deployment.
  - step: Verify replication is active
    description: Right-click any Site Replication edge — it should show 'applied'
      status. All three sites are linked in an N-way replication group.
  - step: Start data generators
    description: Right-click each Data Generator and select Start Generating. Generator
      A pushes to site-a-bucket, Generator B to site-b-bucket, Generator C to site-c-bucket.
  - step: Watch cross-site convergence
    description: Open the Cockpit panel — all three sites should show all three buckets
      (site-a-bucket, site-b-bucket, site-c-bucket) with matching object counts.
  - step: Verify via MinIO Console
    description: Open MinIO Console for any site. You will see buckets from all other
      sites with replicated objects, demonstrating full N-way consistency.
  - step: Test resync
    description: Right-click a Site Replication edge and select 'Resync All Sites'
      to force a full resync between two sites.
  fa_ready: true
