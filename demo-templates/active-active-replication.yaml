# Template metadata
_template:
  name: "Active-Active Replication"
  category: "replication"
  tags: ["replication", "active-active", "bidirectional", "high-availability", "load-balancer", "monitoring"]
  description: "Two MinIO instances with bidirectional bucket replication, fronted by an NGINX load balancer and monitored with Prometheus and Grafana."
  objective: "Demonstrate MinIO's active-active replication where writes on either node are mirrored to the other, with no single point of failure"
  minio_value: "Bidirectional replication enables geo-redundant deployments where any site can accept writes and all data stays consistent across nodes"
  estimated_resources:
    memory: "3GB"
    cpu: 3
    containers: 5
  external_dependencies: []
  walkthrough:
    - step: "Deploy the demo"
      description: "Click Deploy to start both MinIO nodes, NGINX load balancer, Prometheus, and Grafana"
    - step: "Upload objects via load balancer"
      description: "Connect to the NGINX endpoint and upload files to either MinIO node"
    - step: "Verify bidirectional sync"
      description: "Open both MinIO consoles and confirm objects written to one node appear on the other"
    - step: "Simulate node failure"
      description: "Stop one MinIO node and verify that the load balancer routes all traffic to the surviving node"
    - step: "Check Grafana dashboards"
      description: "Review replication lag and throughput metrics in Grafana to confirm replication health"
    - step: "Restore and resync"
      description: "Restart the stopped node and observe it catching up with any objects written during the outage"

# Standard demo definition
id: active-active-replication
name: "Active-Active Replication"
description: "Two MinIO instances with bidirectional replication, load-balanced by NGINX, monitored by Prometheus and Grafana"

networks:
  - name: frontend
    subnet: "172.30.0.0/24"
    dns_suffix: "frontend.demo.local"
  - name: backend
    subnet: "172.30.1.0/24"
    dns_suffix: "backend.demo.local"

nodes:
  - id: minio-1
    component: minio
    variant: replication-source
    position: {x: 300, y: 100}
    config:
      MINIO_ROOT_USER: "minio1admin"
      MINIO_ROOT_PASSWORD: "minio1password"
    networks:
      frontend: {aliases: ["minio-1"]}
      backend: {aliases: ["minio-1"]}

  - id: minio-2
    component: minio
    variant: replication-target
    position: {x: 300, y: 300}
    config:
      MINIO_ROOT_USER: "minio2admin"
      MINIO_ROOT_PASSWORD: "minio2password"
    networks:
      frontend: {aliases: ["minio-2"]}
      backend: {aliases: ["minio-2"]}

  - id: nginx-lb
    component: nginx
    variant: load-balancer
    position: {x: 100, y: 200}
    config: {}
    networks:
      frontend: {aliases: ["lb"]}

  - id: prometheus
    component: prometheus
    variant: default
    position: {x: 500, y: 200}
    config: {}
    networks:
      backend: {aliases: ["prometheus"]}

  - id: grafana
    component: grafana
    variant: default
    position: {x: 700, y: 200}
    config: {}
    networks:
      backend: {aliases: ["grafana"]}

edges:
  - id: e-lb-minio1
    source: nginx-lb
    target: minio-1
    connection_type: load-balance
    network: frontend
    label: "LB -> MinIO-1"

  - id: e-lb-minio2
    source: nginx-lb
    target: minio-2
    connection_type: load-balance
    network: frontend
    label: "LB -> MinIO-2"

  - id: e-repl-1-2
    source: minio-1
    target: minio-2
    connection_type: replication
    network: backend
    label: "Replication"

  - id: e-repl-2-1
    source: minio-2
    target: minio-1
    connection_type: replication
    network: backend
    label: "Replication"

  - id: e-minio1-prom
    source: minio-1
    target: prometheus
    connection_type: metrics
    network: backend
    label: "Metrics"

  - id: e-minio2-prom
    source: minio-2
    target: prometheus
    connection_type: metrics
    network: backend
    label: "Metrics"

  - id: e-prom-grafana
    source: prometheus
    target: grafana
    connection_type: metrics-query
    network: backend
    label: "PromQL"
