_template:
  name: AIStor Tables analytics
  tier: essentials
  category: lakehouse
  tags:
  - metabase
  - bi
  - aistor
  - tables
  - iceberg
  - trino
  - enterprise
  description: 'The lightest possible BI stack: MinIO AIStor with native Iceberg Tables replaces the external catalog — data flows directly from generator to AIStor, Trino queries via the built-in /_iceberg
    endpoint, Metabase delivers dashboards. Only 4 components needed.'
  objective: Demonstrate MinIO AIStor Tables — native Iceberg V3 tables eliminate the need for external catalogs, simplifying the analytics stack from 7 components to 4
  minio_value: MinIO AIStor IS the catalog. No external Iceberg REST, no Hive Metastore, no PostgreSQL. Data stored AND cataloged in one system — the simplest possible lakehouse.
  estimated_resources:
    memory: 4GB
    cpu: 4
    containers: 4
  external_dependencies:
  - MinIO AIStor Enterprise license (RELEASE.2026-02-02 or later)
  walkthrough:
  - step: Configure license
    description: Ensure your MinIO AIStor license is configured in DemoForge Settings → Licenses.
  - step: Deploy the demo
    description: Click Deploy. Only 4 containers start — no external catalog needed. Wait for green health indicators.
  - step: Generate data
    description: The structured data generator automatically pushes Parquet files to MinIO's raw-data bucket.
  - step: Query with Trino
    description: 'Open Trino terminal → use the ''aistor'' catalog: SELECT * FROM aistor.analytics.orders — tables are served directly from MinIO''s /_iceberg endpoint.'
  - step: Open Metabase
    description: Open Metabase Dashboard. Login with admin@demoforge.local / DemoForge123! — Trino is pre-configured with the AIStor catalog.
  - step: Compare architectures
    description: 'Notice: no Iceberg REST container, no external catalog. MinIO AIStor handles both storage AND table management natively.'
  se_guide:
    pitch: Show how MinIO AIStor eliminates the external Iceberg catalog entirely — native Iceberg V3 tables built into the object store, cutting the analytics stack from 7 components to 4.
    audience: Data architects and platform engineers evaluating ways to simplify their lakehouse stack and reduce operational overhead.
    talking_points:
    - Traditional lakehouses need a separate catalog service — Hive Metastore, Iceberg REST, or Glue — just to know where the tables are. AIStor removes that entirely.
    - MinIO AIStor exposes a native /_iceberg endpoint — Trino connects to it directly as a catalog, no external service required.
    - Fewer components means fewer failure points, fewer upgrades to coordinate, and less infrastructure to maintain in production.
    - 'AIStor is fully Iceberg V3 compatible — any engine that speaks Iceberg REST works: Trino, Spark, Flink, Dremio. No proprietary lock-in.'
    - You go from 7 containers in the standard lakehouse to 4 here — data generator, AIStor, Trino, Metabase. That's it.
    demo_flow:
    - step: 1
      action: Click Deploy and wait for all 4 nodes to turn green.
      say: Notice only four components — no Iceberg REST catalog container, no Postgres backing it. AIStor is the catalog.
    - step: 2
      action: Right-click Data Generator → Start Generating to push Parquet files to AIStor.
      say: Data lands in AIStor's raw-data bucket via the S3 API — exactly the same write path as any S3-compatible application.
    - step: 3
      action: 'Open the Trino terminal. Run: SHOW CATALOGS; — point out the ''aistor'' catalog entry.'
      say: Trino is talking to AIStor's built-in /_iceberg endpoint. No external REST service, no additional container.
    - step: 4
      action: 'Run: SELECT * FROM aistor.analytics.orders LIMIT 10;'
      say: Live query, data coming directly from object storage. The table metadata lives inside AIStor alongside the data.
    - step: 5
      action: Open Metabase and show the pre-built dashboard.
      say: End-to-end analytics — four components, one storage system, zero ETL. This is the simplest possible lakehouse architecture.
    common_questions:
    - q: What's the difference between this and the standard Lakehouse quickstart demo?
      a: That demo uses a separate Iceberg REST catalog container backed by Postgres — seven components total. This demo uses AIStor's built-in catalog — four components. Same query results, less infrastructure.
    - q: Does AIStor support Iceberg time travel and schema evolution?
      a: Yes — full Iceberg V3 feature set including time travel, schema evolution, and partition spec updates, all managed natively within AIStor.
    - q: Is this an enterprise-only feature?
      a: AIStor Tables requires a MinIO AIStor enterprise license. It's available from RELEASE.2026-02-02 onward. The license is configured once in DemoForge Settings.
    - q: Can I migrate existing Iceberg tables from an external catalog into AIStor?
      a: Yes — because the underlying data is just Parquet files on S3, you point AIStor at the existing data path and register the tables. No data movement required.
    mc_commands:
    - label: List AIStor buckets
      command: mc ls aistor/
      context: Shows all buckets including raw-data where generator writes and the AIStor-managed table data.
    - label: Inspect Iceberg metadata
      command: mc ls aistor/raw-data --recursive | grep metadata
      context: Shows the Iceberg metadata files AIStor manages natively — no external catalog needed.
    - label: Check AIStor admin info
      command: mc admin info aistor/
      context: Shows AIStor cluster health, version, and Tables feature status.
    - label: View storage usage
      command: mc du aistor/
      context: Total storage consumed — useful for showing the compact footprint of the 4-component stack.
id: template-bi-dashboard-aistor-tables
name: BI Dashboard — AIStor Tables
description: 'Simplest BI stack: MinIO AIStor (native Iceberg) → Trino → Metabase — no external catalog needed'
networks:
- name: default
  subnet: 172.20.0.0/16
  driver: bridge
nodes:
- id: data-gen
  component: data-generator
  variant: default
  position:
    x: -100
    y: 150
  display_name: Data Generator
  config: {}
- id: aistor-1
  component: minio
  variant: single
  position:
    x: 250
    y: 150
  display_name: MinIO AIStor
  config:
    MINIO_ROOT_USER: minioadmin
    MINIO_ROOT_PASSWORD: minioadmin
    MINIO_EDITION: aistor
- id: trino
  component: trino
  variant: default
  position:
    x: 600
    y: 150
  display_name: Trino
  config: {}
- id: metabase
  component: metabase
  variant: default
  position:
    x: 900
    y: 150
  display_name: Metabase
  config: {}
clusters: []
edges:
- id: e-datagen-aistor
  source: data-gen
  target: aistor-1
  connection_type: s3
  network: default
  auto_configure: true
  label: Parquet data
  connection_config:
    bucket: raw-data
- id: e-aistor-trino
  source: aistor-1
  target: trino
  connection_type: s3
  network: default
  auto_configure: true
  label: AIStor Tables
  connection_config:
    catalog_name: aistor
- id: e-trino-metabase
  source: trino
  target: metabase
  connection_type: sql-query
  network: default
  auto_configure: true
  label: SQL
  connection_config:
    catalog: aistor
    schema: analytics
groups: []
sticky_notes: []
resources:
  default_memory: 512m
  default_cpu: 0.5
  max_memory: 2g
  max_cpu: 2.0
  total_memory: 6g
  total_cpu: 6.0
