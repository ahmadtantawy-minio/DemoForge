# Template metadata
_template:
  name: "BI Dashboard — AIStor Tables"
  category: "analytics"
  tags: ["metabase", "bi", "aistor", "tables", "iceberg", "trino", "enterprise"]
  description: "The lightest possible BI stack: MinIO AIStor with native Iceberg Tables replaces the external catalog — data flows directly from generator to AIStor, Trino queries via the built-in /_iceberg endpoint, Metabase delivers dashboards. Only 4 components needed."
  objective: "Demonstrate MinIO AIStor Tables — native Iceberg V3 tables eliminate the need for external catalogs, simplifying the analytics stack from 7 components to 4"
  minio_value: "MinIO AIStor IS the catalog. No external Iceberg REST, no Hive Metastore, no PostgreSQL. Data stored AND cataloged in one system — the simplest possible lakehouse."
  estimated_resources:
    memory: "4GB"
    cpu: 4
    containers: 4
  external_dependencies:
    - "MinIO AIStor Enterprise license (RELEASE.2026-02-02 or later)"
  walkthrough:
    - step: "Configure license"
      description: "Ensure your MinIO AIStor license is configured in DemoForge Settings → Licenses."
    - step: "Deploy the demo"
      description: "Click Deploy. Only 4 containers start — no external catalog needed. Wait for green health indicators."
    - step: "Generate data"
      description: "The structured data generator automatically pushes Parquet files to MinIO's raw-data bucket."
    - step: "Query with Trino"
      description: "Open Trino terminal → use the 'aistor' catalog: SELECT * FROM aistor.analytics.orders — tables are served directly from MinIO's /_iceberg endpoint."
    - step: "Open Metabase"
      description: "Open Metabase Dashboard. Login with admin@demoforge.local / DemoForge123! — Trino is pre-configured with the AIStor catalog."
    - step: "Compare architectures"
      description: "Notice: no Iceberg REST container, no external catalog. MinIO AIStor handles both storage AND table management natively."

# Standard demo definition
id: template-bi-dashboard-aistor-tables
name: "BI Dashboard — AIStor Tables"
description: "Simplest BI stack: MinIO AIStor (native Iceberg) → Trino → Metabase — no external catalog needed"

networks:
  - name: default
    subnet: 172.20.0.0/16
    driver: bridge

nodes:
  # Structured data generator
  - id: data-gen
    component: data-generator
    variant: default
    position: { x: -100, y: 150 }
    display_name: "Data Generator"
    config: {}

  # AIStor with native Tables
  - id: aistor-1
    component: minio-aistore
    variant: single
    position: { x: 250, y: 150 }
    display_name: "MinIO AIStor"
    config:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"

  # SQL engine — connects to AIStor's /_iceberg
  - id: trino
    component: trino
    variant: default
    position: { x: 600, y: 150 }
    display_name: "Trino"
    config: {}

  # BI visualization
  - id: metabase
    component: metabase
    variant: default
    position: { x: 900, y: 150 }
    display_name: "Metabase"
    config: {}

clusters: []

edges:
  # Data Generator → AIStor (S3 push)
  - id: e-datagen-aistor
    source: data-gen
    target: aistor-1
    connection_type: s3
    network: default
    auto_configure: true
    label: "Parquet data"
    connection_config:
      bucket: "raw-data"

  # AIStor → Trino (S3 + native /_iceberg catalog)
  - id: e-aistor-trino
    source: aistor-1
    target: trino
    connection_type: s3
    network: default
    auto_configure: true
    label: "AIStor Tables"
    connection_config:
      catalog_name: "aistor"

  # Trino → Metabase (SQL)
  - id: e-trino-metabase
    source: trino
    target: metabase
    connection_type: sql-query
    network: default
    auto_configure: true
    label: "SQL"
    connection_config:
      catalog: "aistor"
      schema: "analytics"

groups: []
sticky_notes: []

resources:
  default_memory: 512m
  default_cpu: 0.5
  max_memory: 2g
  max_cpu: 2.0
  total_memory: 6g
  total_cpu: 6.0
