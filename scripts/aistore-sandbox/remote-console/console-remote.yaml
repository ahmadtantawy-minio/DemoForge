# Applied by deploy-remote-console.sh (placeholders: __CONSOLE_NS__, __CONSOLE_IMAGE__,
# __KUBE_CONTEXT_UI__, __KUBE_CONTEXT_DATA__). Namespace is created by the script.
# MinIO API URL comes from ConfigMap df-cursor-console-remote-endpoint (CONSOLE_MINIO_SERVER); no ObjectStore
# or S3 disks on this cluster — only this Console talking to cluster A's API.
# Service is ClusterIP (not a public LoadBalancer); use kubectl port-forward to reach the UI.
apiVersion: v1
kind: Secret
metadata:
  name: df-cursor-console-remote-jwt
  namespace: __CONSOLE_NS__
  labels:
    app.kubernetes.io/name: minio-console-remote
    df-cursor.min.io/role: console-remote
    df-cursor.min.io/kube-context: "__KUBE_CONTEXT_UI__"
    df-cursor.min.io/data-kube-context: "__KUBE_CONTEXT_DATA__"
type: Opaque
stringData:
  CONSOLE_PBKDF_PASSPHRASE: "__JWT_PASSPHRASE__"
  CONSOLE_PBKDF_SALT: "__JWT_SALT__"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: df-cursor-console-remote
  namespace: __CONSOLE_NS__
  labels:
    app.kubernetes.io/name: minio-console-remote
    df-cursor.min.io/role: console-remote
    df-cursor.min.io/kube-context: "__KUBE_CONTEXT_UI__"
    df-cursor.min.io/data-kube-context: "__KUBE_CONTEXT_DATA__"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: minio-console-remote
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-console-remote
        df-cursor.min.io/role: console-remote
        df-cursor.min.io/kube-context: "__KUBE_CONTEXT_UI__"
        df-cursor.min.io/data-kube-context: "__KUBE_CONTEXT_DATA__"
    spec:
      containers:
        - name: console
          image: __CONSOLE_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --host=0.0.0.0
            - --port=9090
            - --tls-redirect=off
          env:
            - name: CONSOLE_MINIO_SERVER
              valueFrom:
                configMapKeyRef:
                  name: df-cursor-console-remote-endpoint
                  key: CONSOLE_MINIO_SERVER
            - name: CONSOLE_PBKDF_PASSPHRASE
              valueFrom:
                secretKeyRef:
                  name: df-cursor-console-remote-jwt
                  key: CONSOLE_PBKDF_PASSPHRASE
            - name: CONSOLE_PBKDF_SALT
              valueFrom:
                secretKeyRef:
                  name: df-cursor-console-remote-jwt
                  key: CONSOLE_PBKDF_SALT
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: df-cursor-console-remote
  namespace: __CONSOLE_NS__
  labels:
    app.kubernetes.io/name: minio-console-remote
    df-cursor.min.io/role: console-remote
    df-cursor.min.io/kube-context: "__KUBE_CONTEXT_UI__"
    df-cursor.min.io/data-kube-context: "__KUBE_CONTEXT_DATA__"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: minio-console-remote
  ports:
    - name: http
      port: 9090
      targetPort: 9090
