version: '3.8'
services:
  minio-1:
    image: minio/minio:latest
    container_name: demoforge-dbcd89eb-minio-1
    expose:
    - '9000'
    - '9001'
    environment:
      MINIO_ROOT_USER: minio1admin
      MINIO_ROOT_PASSWORD: minio1password
      MINIO_BROWSER_REDIRECT_URL: ''
    mem_limit: 256m
    cpus: 0.5
    labels:
      demoforge.demo: dbcd89eb
      demoforge.node: minio-1
      demoforge.component: minio
    networks:
      demoforge-dbcd89eb-frontend:
        aliases:
        - minio-1
      demoforge-dbcd89eb-backend:
        aliases:
        - minio-1
    restart: unless-stopped
    command:
    - server
    - /data
    - --console-address
    - :9001
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
    - demoforge-dbcd89eb-minio-1-data:/data
  minio-2:
    image: minio/minio:latest
    container_name: demoforge-dbcd89eb-minio-2
    expose:
    - '9000'
    - '9001'
    environment:
      MINIO_ROOT_USER: minio2admin
      MINIO_ROOT_PASSWORD: minio2password
      MINIO_BROWSER_REDIRECT_URL: ''
    mem_limit: 256m
    cpus: 0.5
    labels:
      demoforge.demo: dbcd89eb
      demoforge.node: minio-2
      demoforge.component: minio
    networks:
      demoforge-dbcd89eb-frontend:
        aliases:
        - minio-2
      demoforge-dbcd89eb-backend:
        aliases:
        - minio-2
    restart: unless-stopped
    command:
    - server
    - /data
    - --console-address
    - :9001
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
    - demoforge-dbcd89eb-minio-2-data:/data
  nginx-lb:
    image: nginx:latest
    container_name: demoforge-dbcd89eb-nginx-lb
    expose:
    - '80'
    - '8080'
    environment:
      NGINX_ENTRYPOINT_QUIET_LOGS: '1'
    mem_limit: 128m
    cpus: 0.25
    labels:
      demoforge.demo: dbcd89eb
      demoforge.node: nginx-lb
      demoforge.component: nginx
    networks:
      demoforge-dbcd89eb-frontend:
        aliases:
        - lb
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:80/
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
    - /Users/ahmadtantawy/Documents/Github.nosync/DemoForge/data/demoforge-dbcd89eb/nginx-lb/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  prometheus:
    image: prom/prometheus:latest
    container_name: demoforge-dbcd89eb-prometheus
    expose:
    - '9090'
    environment: {}
    mem_limit: 256m
    cpus: 0.5
    labels:
      demoforge.demo: dbcd89eb
      demoforge.node: prometheus
      demoforge.component: prometheus
    networks:
      demoforge-dbcd89eb-backend:
        aliases:
        - prometheus
    restart: unless-stopped
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=1h
    - --web.enable-lifecycle
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:9090/-/healthy
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
    - demoforge-dbcd89eb-prometheus-data:/prometheus
    - /Users/ahmadtantawy/Documents/Github.nosync/DemoForge/data/demoforge-dbcd89eb/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  grafana:
    image: grafana/grafana:latest
    container_name: demoforge-dbcd89eb-grafana
    expose:
    - '3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/minio-overview.json
    mem_limit: 256m
    cpus: 0.5
    labels:
      demoforge.demo: dbcd89eb
      demoforge.node: grafana
      demoforge.component: grafana
    networks:
      demoforge-dbcd89eb-backend:
        aliases:
        - grafana
    restart: unless-stopped
    healthcheck:
      test:
      - CMD
      - curl
      - -sf
      - http://localhost:3000/api/health
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
    - demoforge-dbcd89eb-grafana-data:/var/lib/grafana
    - /Users/ahmadtantawy/Documents/Github.nosync/DemoForge/data/demoforge-dbcd89eb/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    - /Users/ahmadtantawy/Documents/Github.nosync/DemoForge/components/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    - /Users/ahmadtantawy/Documents/Github.nosync/DemoForge/components/grafana/provisioning/dashboards/minio-overview.json:/var/lib/grafana/dashboards/minio-overview.json:ro
networks:
  demoforge-dbcd89eb-frontend:
    driver: bridge
    name: demoforge-dbcd89eb-frontend
    ipam:
      config:
      - subnet: 172.30.0.0/24
  demoforge-dbcd89eb-backend:
    driver: bridge
    name: demoforge-dbcd89eb-backend
    ipam:
      config:
      - subnet: 172.30.1.0/24
volumes:
  demoforge-dbcd89eb-minio-1-data:
    driver: local
  demoforge-dbcd89eb-minio-2-data:
    driver: local
  demoforge-dbcd89eb-prometheus-data:
    driver: local
  demoforge-dbcd89eb-grafana-data:
    driver: local
