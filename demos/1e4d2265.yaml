id: 1e4d2265
name: Active-Active Replication
description: Two MinIO instances with bidirectional replication, load-balanced by
  NGINX, monitored by Prometheus and Grafana
networks:
- name: frontend
  subnet: 172.30.0.0/24
  dns_suffix: frontend.demo.local
  driver: bridge
- name: backend
  subnet: 172.30.1.0/24
  dns_suffix: backend.demo.local
  driver: bridge
nodes:
- id: minio-1
  component: minio
  variant: replication-source
  position:
    x: 234.90899567737063
    y: 86.72901853616293
  config:
    MINIO_ROOT_USER: minio1admin
    MINIO_ROOT_PASSWORD: minio1password
  networks:
    frontend:
      ip: null
      aliases:
      - minio-1
    backend:
      ip: null
      aliases:
      - minio-1
- id: minio-2
  component: minio
  variant: replication-target
  position:
    x: 223.53386870836738
    y: 308.2153694776134
  config:
    MINIO_ROOT_USER: minio2admin
    MINIO_ROOT_PASSWORD: minio2password
  networks:
    frontend:
      ip: null
      aliases:
      - minio-2
    backend:
      ip: null
      aliases:
      - minio-2
- id: nginx-lb
  component: nginx
  variant: load-balancer
  position:
    x: -81.37008000577316
    y: 193.68048501722043
  config: {}
  networks:
    frontend:
      ip: null
      aliases:
      - lb
- id: prometheus
  component: prometheus
  variant: default
  position:
    x: 502.5278059931119
    y: 200.0
  config: {}
  networks:
    backend:
      ip: null
      aliases:
      - prometheus
- id: grafana
  component: grafana
  variant: default
  position:
    x: 812.0923970070523
    y: 122.90191721008947
  config: {}
  networks:
    backend:
      ip: null
      aliases:
      - grafana
edges:
- id: e-lb-minio1
  source: nginx-lb
  target: minio-1
  connection_type: load-balance
  network: frontend
  label: LB -> MinIO-1
- id: e-lb-minio2
  source: nginx-lb
  target: minio-2
  connection_type: load-balance
  network: frontend
  label: LB -> MinIO-2
- id: e-repl-1-2
  source: minio-1
  target: minio-2
  connection_type: replication
  network: backend
  label: Replication
- id: e-repl-2-1
  source: minio-2
  target: minio-1
  connection_type: replication
  network: backend
  label: Replication
- id: e-minio1-prom
  source: minio-1
  target: prometheus
  connection_type: metrics
  network: backend
  label: Metrics
- id: e-minio2-prom
  source: minio-2
  target: prometheus
  connection_type: metrics
  network: backend
  label: Metrics
- id: e-prom-grafana
  source: prometheus
  target: grafana
  connection_type: metrics-query
  network: backend
  label: PromQL
